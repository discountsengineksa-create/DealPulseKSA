name: 🗄️ Daily Database Backup

# ════════════════════════════════════════════════════════════════════════════
# نسخة احتياطية يومية لقاعدة بيانات PostgreSQL على Railway.
#
# يعمل بـ 3 طرق:
#   1. تلقائياً كل يوم الساعة 00:00 UTC (03:00 الرياض)
#   2. يدوياً من GitHub Actions tab (workflow_dispatch)
#   3. عند فشل أي خطوة، يرسل إيميل تنبيه فوراً
#
# المخرجات:
#   • Artifact (ملف .sql.gz) محفوظ على GitHub لـ 90 يوم
#   • إيميل بنجاح/فشل العملية + رابط التحميل + الحجم
#
# Secrets المطلوبة (في Settings → Secrets and variables → Actions):
#   BACKUP_DATABASE_URL  — رابط Railway public Postgres
#   RESEND_API_KEY       — مفتاح Resend لإرسال الإيميلات
# ════════════════════════════════════════════════════════════════════════════

on:
  schedule:
    # 00:00 UTC = 03:00 AM Asia/Riyadh (UTC+3) — تشتغل كل يوم
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'سبب التشغيل اليدوي (للسجل فقط)'
        required: false
        default: 'manual run'

env:
  TZ: Asia/Riyadh
  NOTIFY_EMAIL: dealpulseksa@gmail.com
  FROM_EMAIL: noreply@dealpulseksa.com

jobs:
  backup:
    name: Backup Railway Postgres
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─── 1. تثبيت pg_dump 18 ──────────────────────────────────────────
      - name: 📦 Install PostgreSQL 18 client
        run: |
          set -euo pipefail
          echo "::group::Installing pg_dump 18"
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-common curl
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y -qq postgresql-client-18
          echo "::endgroup::"

          # ─── تثبيت PG 18 binaries في بداية الـ PATH ─────────────────
          # Ubuntu 24.04 يجي مع postgresql-client-16 مسبقاً، والـ wrapper
          # عند /usr/bin/pg_dump يستخدم الإصدار الافتراضي (16). pg_dump
          # يتطلّب client.version >= server.version، فلازم نُجبر استخدام 18.
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"

          # تأكيد الإصدار الصحيح بالـ full path
          /usr/lib/postgresql/18/bin/pg_dump --version
          /usr/lib/postgresql/18/bin/psql --version

      # ─── 2. التحقق من الاتصال بقاعدة البيانات قبل البدء ────────────────
      - name: 🔌 Test database connection
        env:
          DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          set -euo pipefail
          psql "$DATABASE_URL" -c "SELECT version();" --quiet --tuples-only \
            > server_version.txt
          echo "Server version: $(cat server_version.txt)"

      # ─── 3. تنفيذ pg_dump مع gzip ─────────────────────────────────────
      - name: 💾 Run pg_dump
        id: dump
        env:
          DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          set -euo pipefail
          TIMESTAMP=$(date +%Y%m%d_%H%M)
          BACKUP_FILE="dealpulseksa_${TIMESTAMP}.sql.gz"
          TEMP_SQL="/tmp/pgdump_${TIMESTAMP}.sql"

          # ─── خطوة 1: pg_dump مباشرة لملف (بدون pipes) ────────────────
          # نتجنّب tee/process-substitution لأنها تسبب gzip "broken pipe"
          # warnings مع pipefail. نكتب لـ file ثم نضغط — أبسط وأنظف.
          echo "::group::Running pg_dump"
          pg_dump "$DATABASE_URL" \
            --format=plain \
            --no-owner \
            --no-acl \
            --verbose \
            --file="$TEMP_SQL" \
            2>dump.log

          # نعرض dump.log في الـ console للشفافية (مفيد لـ debugging)
          echo "── pg_dump verbose log ──"
          tail -30 dump.log
          echo "── (end) ──"
          echo "::endgroup::"

          # ─── خطوة 2: ضغط الـ SQL ─────────────────────────────────────
          echo "::group::Compressing with gzip -9"
          gzip -9 "$TEMP_SQL"
          mv "${TEMP_SQL}.gz" "$BACKUP_FILE"
          echo "::endgroup::"

          # ─── حساب الإحصائيات ─────────────────────────────────────────
          SIZE_BYTES=$(stat -c%s "$BACKUP_FILE")
          SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $SIZE_BYTES / 1024 / 1024}")
          # pg_dump verbose يطبع "creating TABLE" لكل جدول — نعدّهم
          TABLE_COUNT=$(grep -c "^pg_dump: creating TABLE " dump.log || echo "0")
          ROW_DUMPS=$(grep -c "^pg_dump: dumping contents of table " dump.log || echo "0")

          echo "✓ Backup file: $BACKUP_FILE"
          echo "✓ Size:        ${SIZE_MB} MB (${SIZE_BYTES} bytes)"
          echo "✓ Tables:      $TABLE_COUNT created, $ROW_DUMPS dumped"

          # ─── فحوصات الجودة (بدون pipes لتجنّب pipefail+SIGPIPE) ────

          # (1) الحجم الأدنى — DB فاضي حقيقي يكون ~150KB
          if [ "$SIZE_BYTES" -lt 10240 ]; then
            echo "::error::🚨 Backup حجمه مريب: ${SIZE_MB}MB (أقل من 10KB)"
            exit 1
          fi

          # (2) ملف gzip سليم — gunzip -t يفحص الـ integrity بدون decompression
          # كامل، وبدون pipes (لا pipefail issues).
          if ! gunzip -t "$BACKUP_FILE" 2>gunzip_test.log; then
            echo "::error::🚨 Backup ملف gzip فاسد:"
            cat gunzip_test.log
            exit 1
          fi
          echo "✓ gzip integrity check passed"

          # (3) pg_dump verbose قال إنه أنشأ جداول
          # هذا أوثق من grep على ملف الـ .sql.gz — يجي من stderr مباشرة
          # من العملية الفعلية، لذا لو الـ dump فشل صامتاً، TABLE_COUNT=0.
          if [ "$TABLE_COUNT" -lt 1 ]; then
            echo "::error::🚨 pg_dump verbose log ما يحتوي أي 'creating TABLE' — dump فشل صامتاً"
            echo "── آخر 30 سطر من dump.log: ──"
            tail -30 dump.log
            exit 1
          fi
          echo "✓ pg_dump created $TABLE_COUNT tables"

          # ─── تصدير المتغيرات لخطوات لاحقة ────────────────────────
          {
            echo "backup_file=$BACKUP_FILE"
            echo "size_mb=$SIZE_MB"
            echo "size_bytes=$SIZE_BYTES"
            echo "tables=$TABLE_COUNT"
            echo "rows_dumped=$ROW_DUMPS"
            echo "timestamp=$TIMESTAMP"
            echo "trigger=${{ github.event_name }}"
          } >> "$GITHUB_OUTPUT"

      # ─── 4. رفع الـ artifact (90 يوم retention مجاناً) ────────────────
      - name: ☁️ Upload backup artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.dump.outputs.backup_file }}
          path: ${{ steps.dump.outputs.backup_file }}
          retention-days: 90
          compression-level: 0

      # ─── 5. حفظ السجلات (للتشخيص لو فشل) ──────────────────────────────
      - name: 📋 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-log-${{ steps.dump.outputs.timestamp || github.run_id }}
          path: |
            dump.log
            server_version.txt
          retention-days: 30
          if-no-files-found: ignore

      # ─── 6. إيميل نجاح ────────────────────────────────────────────────
      - name: ✉️ Send success email
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          BACKUP_FILE: ${{ steps.dump.outputs.backup_file }}
          SIZE_MB: ${{ steps.dump.outputs.size_mb }}
          TABLES: ${{ steps.dump.outputs.tables }}
          TIMESTAMP: ${{ steps.dump.outputs.timestamp }}
          TRIGGER: ${{ steps.dump.outputs.trigger }}
        run: |
          set -euo pipefail
          cat > body.html <<HTMLEOF
          <div style="font-family: -apple-system, sans-serif; max-width: 600px; margin: 0 auto;">
            <div style="background: linear-gradient(135deg, #10B981 0%, #059669 100%); padding: 24px; border-radius: 12px 12px 0 0; color: white;">
              <h1 style="margin: 0; font-size: 24px;">✅ نسخة احتياطية ناجحة</h1>
              <p style="margin: 8px 0 0; opacity: 0.9;">DealPulse KSA — قاعدة بيانات الإنتاج</p>
            </div>
            <div style="background: #fff; padding: 24px; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 12px 12px;">
              <table style="width: 100%; border-collapse: collapse;">
                <tr><td style="padding: 8px 0; color: #6b7280;">📅 الوقت</td><td style="padding: 8px 0; font-weight: 600;">${TIMESTAMP}</td></tr>
                <tr><td style="padding: 8px 0; color: #6b7280;">📦 الملف</td><td style="padding: 8px 0; font-family: monospace; font-size: 13px;">${BACKUP_FILE}</td></tr>
                <tr><td style="padding: 8px 0; color: #6b7280;">📏 الحجم</td><td style="padding: 8px 0; font-weight: 600;">${SIZE_MB} MB</td></tr>
                <tr><td style="padding: 8px 0; color: #6b7280;">🗂️ الجداول</td><td style="padding: 8px 0; font-weight: 600;">${TABLES}</td></tr>
                <tr><td style="padding: 8px 0; color: #6b7280;">⚡ التشغيل</td><td style="padding: 8px 0;">${TRIGGER}</td></tr>
              </table>
              <div style="margin-top: 24px; text-align: center;">
                <a href="${ARTIFACT_URL}" style="display: inline-block; background: #10B981; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: 600;">⬇️ تحميل النسخة</a>
              </div>
              <p style="margin-top: 24px; padding-top: 16px; border-top: 1px solid #e5e7eb; color: #9ca3af; font-size: 13px;">
                النسخة محفوظة على GitHub Actions لمدة <strong>90 يوم</strong>.
                للاستعادة: <code>gunzip -c FILE.sql.gz | psql \$NEW_DATABASE_URL</code>
              </p>
            </div>
          </div>
          HTMLEOF

          BODY_JSON=$(jq -Rs . < body.html)

          curl --fail -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"${FROM_EMAIL}\",
              \"to\": \"${NOTIFY_EMAIL}\",
              \"subject\": \"✅ DB Backup ${TIMESTAMP} — ${SIZE_MB} MB\",
              \"html\": ${BODY_JSON}
            }"

      # ─── 7. إيميل فشل ─────────────────────────────────────────────────
      - name: 🚨 Send failure email
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M')

          cat > fail.html <<HTMLEOF
          <div style="font-family: -apple-system, sans-serif; max-width: 600px; margin: 0 auto;">
            <div style="background: linear-gradient(135deg, #DC2626 0%, #991B1B 100%); padding: 24px; border-radius: 12px 12px 0 0; color: white;">
              <h1 style="margin: 0; font-size: 24px;">🚨 فشلت النسخة الاحتياطية</h1>
              <p style="margin: 8px 0 0; opacity: 0.9;">DealPulse KSA — تحقّق فوراً</p>
            </div>
            <div style="background: #fff; padding: 24px; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 12px 12px;">
              <p style="font-size: 16px; color: #374151;">
                النسخة الاحتياطية اليومية فشلت في <strong>${TIMESTAMP}</strong>.
              </p>
              <p style="color: #374151;">هذا قد يعني:</p>
              <ul style="color: #6b7280;">
                <li>قاعدة البيانات على Railway مو متاحة</li>
                <li>كلمة سر DATABASE_URL تغيّرت</li>
                <li>مشكلة في GitHub Actions نفسها</li>
              </ul>
              <div style="margin-top: 24px; text-align: center;">
                <a href="${RUN_URL}" style="display: inline-block; background: #DC2626; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: 600;">🔍 افتح السجل الكامل</a>
              </div>
              <p style="margin-top: 24px; padding-top: 16px; border-top: 1px solid #e5e7eb; color: #9ca3af; font-size: 13px;">
                <strong>⚠️ إجراء فوري مطلوب:</strong> افتح السجل وشيك السبب. لو ما تقدر تصلّحها، شغّل الـ workflow يدوياً من Actions tab.
              </p>
            </div>
          </div>
          HTMLEOF

          BODY_JSON=$(jq -Rs . < fail.html)

          curl -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"${FROM_EMAIL}\",
              \"to\": \"${NOTIFY_EMAIL}\",
              \"subject\": \"🚨 DB Backup FAILED — ${TIMESTAMP}\",
              \"html\": ${BODY_JSON}
            }"
