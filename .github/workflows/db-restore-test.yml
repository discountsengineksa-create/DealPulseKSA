name: 🧪 Weekly DB Restore Test

# ════════════════════════════════════════════════════════════════════════════
# اختبار استعادة أسبوعي للتأكد إن آخر backup قابل للاستعادة فعلياً.
#
# Backup سليم على الورق ≠ Backup يقدر يُستعاد. ممكن يكون:
#   • نُسخ ناقصاً بسبب timeout
#   • فيه أعمدة جديدة pg_dump 18 ما يفهمها
#   • فيه دوال SQL منكسرة
#
# الاختبار:
#   1. يحمّل آخر backup من Artifacts
#   2. يفك ضغطه
#   3. يستعيده على PostgreSQL 18 مؤقت (Docker service)
#   4. يفحص الجداول الحرجة موجودة وفيها بيانات
#   5. يرسل إيميل بالنتيجة
#
# يعمل يوم السبت 06:00 UTC (09:00 الرياض)
# ════════════════════════════════════════════════════════════════════════════

on:
  schedule:
    # كل سبت 06:00 UTC = 09:00 الرياض (بعد backup الفجر بـ 6 ساعات)
    - cron: '0 6 * * 6'
  workflow_dispatch:

env:
  NOTIFY_EMAIL: dealpulseksa@gmail.com
  FROM_EMAIL: noreply@dealpulseksa.com

jobs:
  restore-test:
    name: Restore latest backup and verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: restore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📦 Install pg_dump 18
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y -qq postgresql-client-18

          # نُجبر استخدام PG 18 binaries (Ubuntu 24.04 يجي مع PG 16 افتراضياً)
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/18/bin/pg_dump --version
          /usr/lib/postgresql/18/bin/psql --version

      # نستخدم GitHub API للحصول على آخر artifact من workflow الـ backup
      - name: 🔎 Find latest backup artifact
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # نجلب آخر run ناجح لـ db-backup.yml
          LATEST_RUN=$(gh api \
            "/repos/${{ github.repository }}/actions/workflows/db-backup.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].id')

          if [ -z "$LATEST_RUN" ]; then
            echo "::error::لم يُعثر على أي backup ناجح"
            exit 1
          fi

          # نجلب artifacts من ذلك الـ run
          ARTIFACTS=$(gh api "/repos/${{ github.repository }}/actions/runs/${LATEST_RUN}/artifacts")

          # نختار الـ artifact اللي اسمه يبدأ بـ dealpulseksa_
          ARTIFACT_ID=$(echo "$ARTIFACTS" | jq -r '.artifacts[] | select(.name | startswith("dealpulseksa_")) | .id' | head -1)
          ARTIFACT_NAME=$(echo "$ARTIFACTS" | jq -r '.artifacts[] | select(.name | startswith("dealpulseksa_")) | .name' | head -1)

          if [ -z "$ARTIFACT_ID" ]; then
            echo "::error::لم يُعثر على artifact للـ backup"
            exit 1
          fi

          echo "Found: $ARTIFACT_NAME (id=$ARTIFACT_ID, run=$LATEST_RUN)"
          {
            echo "run_id=$LATEST_RUN"
            echo "artifact_id=$ARTIFACT_ID"
            echo "artifact_name=$ARTIFACT_NAME"
          } >> "$GITHUB_OUTPUT"

      - name: ⬇️ Download backup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api "/repos/${{ github.repository }}/actions/artifacts/${{ steps.find.outputs.artifact_id }}/zip" \
            > backup.zip
          unzip -q backup.zip
          ls -lh dealpulseksa_*.sql.gz

      - name: 🔄 Restore to temp PostgreSQL
        id: restore
        run: |
          set -euo pipefail
          BACKUP_FILE=$(ls dealpulseksa_*.sql.gz | head -1)
          echo "Restoring: $BACKUP_FILE"

          START=$(date +%s)
          gunzip -c "$BACKUP_FILE" | \
            psql "postgresql://testuser:testpass@localhost:5432/restore_test" \
            > restore.log 2>&1 || {
              echo "::error::Restore failed — see log:"
              tail -50 restore.log
              exit 1
            }
          END=$(date +%s)
          DURATION=$((END - START))

          echo "✅ Restore completed in ${DURATION}s"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"

      - name: ✅ Verify critical tables
        id: verify
        run: |
          set -euo pipefail
          PSQL="psql postgresql://testuser:testpass@localhost:5432/restore_test -t -A"

          # ─── الجداول الحرجة + الحد الأدنى للصفوف ──────────────────
          declare -A min_rows=(
            [web_users]=0      # يبدأ من 0 وقت الإطلاق
            [bot_users]=0
            [coupons]=1        # لازم يكون فيه كوبون واحد على الأقل
            [stores]=1
            [user_favorites]=0
          )

          REPORT=""
          FAILED=0

          for table in "${!min_rows[@]}"; do
            min=${min_rows[$table]}
            # نتحقق إن الجدول موجود
            EXISTS=$($PSQL -c "SELECT EXISTS(SELECT 1 FROM information_schema.tables WHERE table_name='$table')")
            if [ "$EXISTS" != "t" ]; then
              echo "::error::Missing table: $table"
              REPORT="$REPORT<tr><td>$table</td><td style='color:#DC2626'>❌ مفقود</td></tr>"
              FAILED=1
              continue
            fi

            COUNT=$($PSQL -c "SELECT COUNT(*) FROM $table")
            if [ "$COUNT" -lt "$min" ]; then
              echo "::warning::$table has $COUNT rows (expected >= $min)"
              REPORT="$REPORT<tr><td>$table</td><td style='color:#F59E0B'>⚠️ $COUNT (تحت الحد)</td></tr>"
            else
              echo "  ✓ $table: $COUNT rows"
              REPORT="$REPORT<tr><td>$table</td><td style='color:#10B981'>✓ $COUNT</td></tr>"
            fi
          done

          # ─── إجمالي الإحصائيات ───────────────────────────────────
          TOTAL_TABLES=$($PSQL -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public'")
          DB_SIZE=$($PSQL -c "SELECT pg_size_pretty(pg_database_size('restore_test'))")

          echo "Total tables: $TOTAL_TABLES"
          echo "Database size: $DB_SIZE"

          {
            echo "report<<EOF"
            echo "$REPORT"
            echo "EOF"
            echo "total_tables=$TOTAL_TABLES"
            echo "db_size=$DB_SIZE"
            echo "failed=$FAILED"
          } >> "$GITHUB_OUTPUT"

          if [ "$FAILED" = "1" ]; then
            exit 1
          fi

      - name: ✉️ Send result email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BACKUP_NAME: ${{ steps.find.outputs.artifact_name }}
          DURATION: ${{ steps.restore.outputs.duration }}
          TOTAL_TABLES: ${{ steps.verify.outputs.total_tables }}
          DB_SIZE: ${{ steps.verify.outputs.db_size }}
          REPORT: ${{ steps.verify.outputs.report }}
          STATUS: ${{ job.status }}
        run: |
          set +e
          TIMESTAMP=$(date '+%Y-%m-%d')

          if [ "$STATUS" = "success" ]; then
            HEADER_COLOR="linear-gradient(135deg, #10B981 0%, #059669 100%)"
            HEADER_TEXT="✅ Restore Test نجح"
            SUBJECT_PREFIX="✅"
          else
            HEADER_COLOR="linear-gradient(135deg, #DC2626 0%, #991B1B 100%)"
            HEADER_TEXT="🚨 Restore Test فشل"
            SUBJECT_PREFIX="🚨"
          fi

          cat > body.html <<HTMLEOF
          <div style="font-family: -apple-system, sans-serif; max-width: 600px; margin: 0 auto;">
            <div style="background: ${HEADER_COLOR}; padding: 24px; border-radius: 12px 12px 0 0; color: white;">
              <h1 style="margin: 0; font-size: 24px;">${HEADER_TEXT}</h1>
              <p style="margin: 8px 0 0; opacity: 0.9;">اختبار استعادة أسبوعي — ${TIMESTAMP}</p>
            </div>
            <div style="background: #fff; padding: 24px; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 12px 12px;">
              <p style="color: #374151;">تم اختبار النسخة <code style="background: #f3f4f6; padding: 2px 6px; border-radius: 4px;">${BACKUP_NAME}</code> على PostgreSQL 18 مؤقت.</p>

              <table style="width: 100%; border-collapse: collapse; margin-top: 16px;">
                <tr><td style="padding: 8px 0; color: #6b7280;">⏱️ مدة الاستعادة</td><td style="padding: 8px 0; font-weight: 600;">${DURATION} ثانية</td></tr>
                <tr><td style="padding: 8px 0; color: #6b7280;">🗂️ مجموع الجداول</td><td style="padding: 8px 0; font-weight: 600;">${TOTAL_TABLES}</td></tr>
                <tr><td style="padding: 8px 0; color: #6b7280;">💾 حجم القاعدة المُستعادة</td><td style="padding: 8px 0; font-weight: 600;">${DB_SIZE}</td></tr>
              </table>

              <h3 style="margin-top: 24px; color: #374151;">فحص الجداول الحرجة:</h3>
              <table style="width: 100%; border-collapse: collapse; border: 1px solid #e5e7eb; border-radius: 8px;">
                <thead><tr style="background: #f9fafb;"><th style="padding: 12px; text-align: right; color: #6b7280;">الجدول</th><th style="padding: 12px; text-align: right; color: #6b7280;">النتيجة</th></tr></thead>
                <tbody>${REPORT}</tbody>
              </table>

              <p style="margin-top: 24px; padding-top: 16px; border-top: 1px solid #e5e7eb; color: #9ca3af; font-size: 13px;">
                هذا اختبار <strong>أسبوعي</strong> يجري كل سبت 9 صباحاً. يضمن إن backupاتك ليست فقط موجودة، بل قابلة للاستعادة فعلياً.
              </p>
            </div>
          </div>
          HTMLEOF

          BODY_JSON=$(jq -Rs . < body.html)

          curl -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"${FROM_EMAIL}\",
              \"to\": \"${NOTIFY_EMAIL}\",
              \"subject\": \"${SUBJECT_PREFIX} Weekly Restore Test — ${TIMESTAMP}\",
              \"html\": ${BODY_JSON}
            }"
