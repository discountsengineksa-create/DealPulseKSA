<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<!-- Cache busting: Telegram WebView يحفظ نسخة آخر فتح بقوّة — هذه الـ headers
     مع version param في fetches أدناه تضمن أن المستخدم يرى أحدث محتوى دائماً. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>نبض الصفقات | Deal Pulse KSA</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES ── */
:root {
  --bg:          #080E1D;
  --bg2:         #0C1527;
  --card:        rgba(255,255,255,0.04);
  --card-h:      rgba(255,255,255,0.08);
  --border:      rgba(255,255,255,0.08);
  --blur:        blur(22px);
  --em:          #10B981;
  --em2:         #059669;
  --em-glow:     rgba(16,185,129,0.20);
  --t1:          #F1F5F9;
  --t2:          rgba(241,245,249,0.70);
  --t3:          rgba(241,245,249,0.40);
  --grad-bg:     linear-gradient(160deg,#080E1D 0%,#0C1527 45%,#0F2040 100%);
  --font:        'Cairo', -apple-system, sans-serif;
}

/* ── RESET & BASE ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
/* ⚠️ مهم: html بدون overflow:hidden — كان يمنع التمرير الرأسي على iOS Telegram WebView.
   نتركه يرث overflow الافتراضي + ندعم safe-area للأجهزة ذات الـ notch. */
html{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
body{
  font-family:var(--font);
  background:var(--grad-bg);
  color:var(--t1);
  min-height:100vh;
  overflow-x:hidden;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(90px + env(safe-area-inset-bottom,16px));
}

.glass{ background:var(--card); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border); }

/* ── HEADER ── */
.hdr{ position:sticky;top:0;z-index:100; padding:15px 18px; background:linear-gradient(180deg,var(--bg) 60%,transparent); }
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.logo{display:flex;align-items:center;gap:12px}
.logo-img{ width:45px; height:45px; object-fit: contain; }
.logo-txt h1{font-size:16px;font-weight:900;color:var(--t1);line-height:1.2}
.logo-txt p{font-size:10px;font-weight:700;color:var(--em);letter-spacing:1px}

/* ── SEARCH ── */
.srch-wrap{position:relative}
.srch{ width:100%; padding:14px 44px 14px 18px; border-radius:15px; font-family:var(--font);font-size:14px; color:var(--t1); border:1px solid var(--border); outline:none; transition:0.3s; }
.srch:focus{border-color:var(--em); background:rgba(255,255,255,0.08)}
.srch-ico{ position:absolute; top:50%; transform:translateY(-50%); opacity:0.4; }
html[dir="rtl"] .srch-ico{ right:15px; }
html[dir="ltr"] .srch-ico{ left:15px; }
html[dir="ltr"] .srch{ padding:14px 18px 14px 44px; }

/* ── STATS ── */
.stats{display:flex;gap:10px;padding:0 18px}
.stat{ flex:1;padding:15px;border-radius:18px;text-align:center; }
.stat-v{font-size:20px;font-weight:900;color:var(--em)}
.stat-l{font-size:11px;color:var(--t3);margin-top:4px}

/* ── CARDS GRID ── */
.stores{padding:25px 18px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
.card{ border-radius:20px; padding:15px; cursor:pointer; transition:0.3s cubic-bezier(0.4,0,0.2,1); }
.card:active{transform:scale(0.95)}

.c-ava {
    width: 100%;
    height: 90px;
    background: rgba(255,255,255,0.03);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    overflow: hidden;
}
.c-ava img {
    max-width: 80%;
    max-height: 80%;
    object-fit: contain;
}

.c-name{font-size:14px;font-weight:800;color:var(--t1);margin-bottom:6px;text-align:center}
.disc-badge{
    display:block; text-align:center; padding:6px; border-radius:10px;
    background:rgba(16,185,129,0.1); color:var(--em); font-size:11px; font-weight:800;
    border: 1px solid rgba(16,185,129,0.2);
}

.c-foot{display:flex;justify-content:center;margin-top:12px}
.go-lbl{font-size:11px;color:var(--t3);font-weight:600;border-bottom:1px solid var(--border)}

/* ── MODAL ── */
.overlay{ position:fixed;inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(10px); z-index:200; display:flex;align-items:flex-end; opacity:0;pointer-events:none; transition:0.3s; }
.overlay.on{opacity:1;pointer-events:all}
.sheet{ width:100%; background:var(--bg2); border-radius:28px 28px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); transform:translateY(100%); transition:0.4s cubic-bezier(0.32,0.72,0,1); border-top:1px solid var(--border); }
.overlay.on .sheet{transform:translateY(0)}
.m-ava-big{ width:80px; height:80px; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.05); border-radius:20px; }
.m-ava-big img{ width:70%; }
.cpn-box{
    margin:20px 0; padding:20px; border-radius:18px; border:2px dashed var(--em);
    text-align:center; background:rgba(16,185,129,0.05); cursor:pointer;
}
.big-cpn{font-size:24px;font-weight:900;color:var(--em);letter-spacing:4px;font-family:monospace}
.btn-p{ width:100%; padding:16px; border-radius:15px; background:var(--em); color:#fff; border:none; font-weight:800; font-size:16px; cursor:pointer; }

/* ── NAV ── */
.bnav{ position:fixed;bottom:0;width:100%; padding:12px 20px calc(12px + env(safe-area-inset-bottom)); display:flex;justify-content:space-around; background:rgba(8,14,29,0.8); border-top:1px solid var(--border); z-index:150; }
.nitem{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--t3);text-decoration:none;font-size:10px;font-weight:700}
.nitem.on{color:var(--em)}

.toast{ position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:12px 24px; background:var(--em); color:#fff; border-radius:50px; font-weight:700; z-index:400; opacity:0; transition:0.3s; }
.toast.on{opacity:1; top:40px}
</style>
</head>

<body>
<div class="toast" id="toast"></div>

<header class="hdr">
  <div class="hdr-row">
    <div class="logo">
      <img src="logo.png" class="logo-img" alt="Logo">
      <div class="logo-txt">
        <h1 id="brandName">نبض الصفقات</h1>
        <p>DEAL PULSE KSA · <span id="lastSync" style="opacity:0.6;font-size:9px;letter-spacing:0">--</span></p>
      </div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="glass" id="langBtn" title="Language" style="padding:8px 10px; border-radius:10px; color:var(--em); border:none; font-weight:800; font-size:11px;" onclick="toggleLang()">EN</button>
      <button class="glass" id="refreshBtn" style="padding:8px 12px; border-radius:10px; color:var(--t2); border:none;" onclick="refreshData()">تحديث</button>
    </div>
  </div>
  <div class="srch-wrap" id="srchWrap">
    <input class="srch glass" id="srchInput" type="text" placeholder="ابحث عن متجر أو قسم..." oninput="onSearch(this.value)">
    <span class="srch-ico">🔍</span>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════════════════
     VIEW: HOME — الستات + chips الأقسام + grid المتاجر
     ═══════════════════════════════════════════════════════════════════ -->
<main id="viewHome">
  <div class="stats">
    <div class="stat glass" onclick="setFilter('trending')" style="cursor:pointer">
      <div class="stat-v" id="sTrend">0</div><div class="stat-l" id="lblTrend">ترند</div>
    </div>
    <div class="stat glass" onclick="scrollToCats()" style="cursor:pointer">
      <div class="stat-v" id="sCats">0</div><div class="stat-l" id="lblCats">قسم</div>
    </div>
    <div class="stat glass" onclick="setFilter('all')" style="cursor:pointer">
      <div class="stat-v" id="sStores">0</div><div class="stat-l" id="lblStores">متجر</div>
    </div>
  </div>

  <div id="catsBar" style="padding:14px 18px 0;overflow-x:auto;white-space:nowrap;scrollbar-width:none">
    <div id="catsChips" style="display:inline-flex;gap:8px"></div>
  </div>
  <style>
  #catsBar::-webkit-scrollbar{display:none}
  .chip{display:inline-block;padding:8px 14px;border-radius:20px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;transition:0.2s;white-space:nowrap}
  .chip:active{transform:scale(0.95)}
  .chip.on{background:rgba(16,185,129,0.15);color:var(--em);border-color:rgba(16,185,129,0.4)}
  /* Sub-view (Category / Store) — يستبدل home بالكامل */
  .subview{display:none;padding:18px;animation:slideIn 0.25s ease-out}
  .subview.on{display:block}
  @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .sv-title{font-size:22px;font-weight:900;color:var(--t1);margin-bottom:16px;text-align:center}
  .sv-back{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--em);font-weight:700;font-size:12px;cursor:pointer;margin-bottom:14px}
  .store-hero{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:20px;padding:24px 18px;text-align:center;margin-bottom:16px}
  .store-hero img{width:110px;height:110px;object-fit:contain;background:rgba(255,255,255,0.05);border-radius:18px;padding:8px}
  .store-hero h2{margin:14px 0 6px;font-size:20px;font-weight:900;color:var(--t1)}
  .store-hero p{color:var(--t3);font-size:13px;line-height:1.6}
  .coupon-box{margin:18px 0;padding:24px 16px;border:2px dashed var(--em);border-radius:18px;text-align:center;background:rgba(16,185,129,0.06);cursor:pointer}
  .coupon-box .lbl{font-size:11px;color:var(--t3);margin-bottom:8px;letter-spacing:1px}
  .coupon-box .code{font-size:28px;font-weight:900;color:var(--em);letter-spacing:5px;font-family:monospace}
  .cta-row{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .cta-row button{padding:16px;border-radius:14px;border:none;font-weight:800;font-size:15px;cursor:pointer;font-family:var(--font)}
  .cta-primary{background:var(--em);color:#fff}
  .cta-ghost{background:rgba(255,255,255,0.04);color:var(--t2);border:1px solid var(--border) !important}
  .store-meta{margin-top:18px;padding-top:18px;border-top:1px solid var(--border);font-size:12px;color:var(--t3);text-align:center;line-height:1.8}
  </style>

  <div class="stores">
    <div id="sectionTitle" style="padding:0 18px 12px;font-size:14px;font-weight:800;color:var(--t1);opacity:0.85"></div>
    <div class="grid" id="storesGrid"></div>
  </div>
</main>

<!-- ═══════════════════════════════════════════════════════════════════
     VIEW: CATEGORY — صفحة قسم معيّن (متاجر هذا القسم)
     ═══════════════════════════════════════════════════════════════════ -->
<main id="viewCategory" class="subview">
  <button class="sv-back" onclick="goBack()">← <span id="catBackLbl">رجوع</span></button>
  <div class="sv-title" id="catTitle">قسم</div>
  <div class="grid" id="catGrid"></div>
</main>

<!-- ═══════════════════════════════════════════════════════════════════
     VIEW: STORE — صفحة متجر مفرد (الكوبون + الذهاب)
     ═══════════════════════════════════════════════════════════════════ -->
<main id="viewStore" class="subview">
  <button class="sv-back" onclick="goBack()">← <span id="storeBackLbl">رجوع</span></button>
  <div id="storeBody"></div>
</main>

<script>
// ── Telegram WebApp integration (ready/expand/theme) ─────────────────────
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  try {
    tg.ready();        // يُعلم Telegram أن التطبيق محمّل (يخفي شاشة التحميل)
    tg.expand();       // يفتح كامل الشاشة (vs نصف الشاشة الافتراضي)
    tg.enableClosingConfirmation();  // يطلب تأكيد قبل الإغلاق
    // theme: ندمج لون header مع gradient التطبيق
    if (tg.setHeaderColor) tg.setHeaderColor('#080E1D');
    if (tg.setBackgroundColor) tg.setBackgroundColor('#080E1D');
  } catch (e) { /* تجاهل لو نسخة قديمة من Telegram */ }
}

const tgUserId = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) || null;
const tgLangCode = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.language_code) || '';
const LANG = tgLangCode.toLowerCase().startsWith('en') ? 'en' : 'ar';

// ── Strings dict (UI labels — server returns content already lang-substituted) ──
const STRINGS = {
  ar: {
    brand:           'نبض الصفقات',
    refresh:         'تحديث',
    refreshing:      '🔄 جاري التحديث...',
    searchHolder:    'ابحث عن متجر أو قسم...',
    stores:          'متجر',
    cats:            'قسم',
    trending:        'ترند',
    detailsLabel:    'تفاصيل العرض',
    copyHint:        'إضغط لنسخ الكود',
    noCoupon:        'لا يوجد كود',
    goToStore:       'الانتقال للمتجر',
    close:           'إغلاق',
    copied:          '✅ تم نسخ الكود بنجاح',
    fetchErr:        '❌ عذراً، تعذر تحديث البيانات',
    home:            'الرئيسية',
    trendTab:        'الترند 🔥',
    siteTab:         'الموقع 🌐',
    title:           'نبض الصفقات | Deal Pulse KSA',
    chipAll:         '✨ الكل',
    sectionAll:      'أبرز المتاجر',
    sectionTrend:    'الترند 🔥',
    sectionCat:      'قسم: ',
  },
  en: {
    brand:           'Deal Pulse',
    refresh:         'Refresh',
    refreshing:      '🔄 Refreshing...',
    searchHolder:    'Search store or category...',
    stores:          'Stores',
    cats:            'Categories',
    trending:        'Trending',
    detailsLabel:    'View offer',
    copyHint:        'Tap to copy code',
    noCoupon:        'No code',
    goToStore:       'Go to store',
    close:           'Close',
    copied:          '✅ Code copied successfully',
    fetchErr:        '❌ Sorry, failed to refresh data',
    home:            'Home',
    trendTab:        'Trending 🔥',
    siteTab:         'Website 🌐',
    title:           'Deal Pulse KSA',
    chipAll:         '✨ All',
    sectionAll:      'Top Stores',
    sectionTrend:    'Trending 🔥',
    sectionCat:      'Category: ',
  }
};
// LANG_OVERRIDE من localStorage يهيمن على Telegram language_code
const LANG_STORED = (typeof localStorage !== 'undefined') ? localStorage.getItem('dp_lang') : null;
let LANG_CURRENT = LANG_STORED || LANG;
const S = STRINGS[LANG_CURRENT];

// ── Apply direction + static labels at boot ─────────────────────────────
// helper يكتب نص فقط لو العنصر موجود — يحمي السكربت من crash لو عنصر محذوف.
function _setText(id, text) {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
}
function _setPlaceholder(id, text) {
    const el = document.getElementById(id);
    if (el) el.placeholder = text;
}
function applyLang() {
  const L = LANG_CURRENT;
  const ST = STRINGS[L];
  document.documentElement.lang = L;
  document.documentElement.dir  = (L === 'en') ? 'ltr' : 'rtl';
  document.body.style.direction = (L === 'en') ? 'ltr' : 'rtl';
  document.title = ST.title;
  _setText('brandName', ST.brand);
  _setText('refreshBtn', ST.refresh);
  _setPlaceholder('srchInput', ST.searchHolder);
  _setText('lblStores', ST.stores);
  _setText('lblCats', ST.cats);
  _setText('lblTrend', ST.trending);
  // الزر يعرض اللغة المقابلة (لو AR نعرض EN للتبديل)
  _setText('langBtn', (L === 'ar') ? 'EN' : 'ع');
  // ملاحظة: navHome/navStores/navCats/navTrend أُزيلت مع bottom nav — لا مراجع بعد الآن.
}
applyLang();

function toggleLang() {
    LANG_CURRENT = (LANG_CURRENT === 'ar') ? 'en' : 'ar';
    try { localStorage.setItem('dp_lang', LANG_CURRENT); } catch(e){}
    // نُعيد التحميل بلغة الجديدة (الـ API يردّ بـ name_en/store_bio_en حسب lang)
    location.reload();
}

// ── Unified Source of Truth ─────────────────────────────────────────────
// API_BASE: نفس الـ API الذي يستهلكه الموقع (api.dealpulseksa.com) — لا
// fetches محلية ولا fallbacks. window.location.origin يكفل الاتساق سواء
// كان الـ Mini App مُخدّماً من api.dealpulseksa.com أو من Railway URL.
const API_BASE = window.location.origin + '/api/v1';
// WEB_BASE: الموقع الرسمي — وجهة "صفحة المتجر الكاملة" والـ nav tabs.
// يفتح خارج Mini App عبر tg.openLink() ليبقى Mini App مفتوحاً للعودة.
const WEB_BASE = 'https://www.dealpulseksa.com';

// ═══════════════════════════════════════════════════════════════════════════
// State management — SPA داخل Mini App (3 views، Telegram BackButton أصلي)
// ═══════════════════════════════════════════════════════════════════════════
let ALL = [];
let CATS = [];
let activeSearch = '';
let activeFilter = 'all';      // 'all' | 'trending' (للـ home grid فقط)
let currentView = 'home';      // 'home' | 'category' | 'store'
let viewStack = [];            // stack للرجوع (آخر view → الرجوع له)
let viewContext = {};          // {category: 'عطور'} | {storeId: 17}

// ═══════════════════════════════════════════════════════════════════════════
//                  View Manager — لا يفتح خارج أبداً
// ═══════════════════════════════════════════════════════════════════════════
function switchView(name) {
    document.getElementById('viewHome').style.display     = (name === 'home') ? 'block' : 'none';
    document.getElementById('viewCategory').classList.toggle('on', name === 'category');
    document.getElementById('viewStore').classList.toggle('on', name === 'store');
    // إخفاء البحث في sub-views (محصور على home)
    const srch = document.getElementById('srchWrap');
    if (srch) srch.style.display = (name === 'home') ? 'block' : 'none';
    currentView = name;
    window.scrollTo({ top: 0, behavior: 'instant' });
    updateTelegramBackButton();
}

function updateTelegramBackButton() {
    if (!tg || !tg.BackButton) return;
    if (currentView === 'home') {
        tg.BackButton.hide();
    } else {
        tg.BackButton.show();
    }
}

function goBack() {
    const prev = viewStack.pop() || { view: 'home', context: {} };
    viewContext = prev.context || {};
    switchView(prev.view);
    // أعد رسم الـ view لو رجعنا لـ category سابق
    if (prev.view === 'category' && viewContext.category) {
        renderCategoryView(viewContext.category);
    }
}

function showCategoryView(name) {
    viewStack.push({ view: currentView, context: { ...viewContext } });
    viewContext = { category: name };
    renderCategoryView(name);
    switchView('category');
}

function showStoreView(storeId) {
    viewStack.push({ view: currentView, context: { ...viewContext } });
    viewContext = { storeId };
    renderStoreView(storeId);
    switchView('store');
}

function scrollToCats() {
    const el = document.getElementById('catsBar');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Categories loader — chips قابلة للفلترة ─────────────────────────────
async function loadCategories() {
    try {
        const res = await fetch(
            `${API_BASE}/coupons/categories?_=${Date.now()}`,
            { cache: 'no-store', headers: {'Cache-Control': 'no-cache'} }
        );
        if (!res.ok) { console.warn('[loadCategories] HTTP', res.status); return; }
        const payload = await res.json();
        CATS = payload.categories || [];
        renderCategoryChips();
        updateStats();
    } catch (err) {
        console.error('[loadCategories] failed:', err);
    }
}

function renderCategoryChips() {
    const bar = document.getElementById('catsChips');
    if (!bar) return;
    const ST = STRINGS[LANG_CURRENT];
    // "✨ الكل" يفعّل filter all على home
    let html = `<span class="chip ${activeFilter==='all'?'on':''}" onclick="setFilter('all')">${ST.chipAll}</span>`;
    // كل قسم → يفتح Category VIEW (وليس filter محلي)
    for (const c of CATS) {
        const safe = String(c.tag_name).replace(/'/g, "\\'");
        html += `<span class="chip" onclick="showCategoryView('${safe}')"># ${c.tag_name}</span>`;
    }
    bar.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════════
//                  Category View Rendering
// ═══════════════════════════════════════════════════════════════════════════
function renderCategoryView(catName) {
    const ST = STRINGS[LANG_CURRENT];
    document.getElementById('catTitle').textContent = `# ${catName}`;
    document.getElementById('catBackLbl').textContent = ST.home;
    const matched = ALL.filter(s => (s.tags || []).map(t=>String(t).trim()).includes(catName));
    const grid = document.getElementById('catGrid');
    if (!matched.length) {
        const msg = LANG_CURRENT === 'en'
            ? 'No stores in this category yet.'
            : 'لا توجد متاجر في هذا القسم بعد.';
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--t3);padding:40px 20px;font-size:13px">${msg}</div>`;
        return;
    }
    grid.innerHTML = matched.map(s => storeCardHTML(s)).join('');
}

// HTML لبطاقة متجر — مشتركة بين home grid و category grid
function storeCardHTML(s) {
    const trendBadge = s.trending
        ? `<span style="position:absolute;top:8px;${LANG_CURRENT==='en'?'right':'left'}:8px;background:rgba(239,68,68,0.18);color:#FCA5A5;font-size:10px;font-weight:800;padding:3px 8px;border-radius:8px;border:1px solid rgba(239,68,68,0.3)">🔥</span>`
        : '';
    const logoSrc = (s.logo || 'logo.png').replace(/"/g, '&quot;');
    const ST = STRINGS[LANG_CURRENT];
    return `
    <div class="card glass" style="position:relative" onclick="showStoreView(${s.id})">
        ${trendBadge}
        <div class="c-ava"><img src="${logoSrc}" alt="${s.store_id}" onerror="this.onerror=null;this.src='logo.png'"></div>
        <div class="c-name">${s.store_id}</div>
        <div class="disc-badge">${s.disc}</div>
        <div class="c-foot"><span class="go-lbl">${ST.detailsLabel}</span></div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════
//                  Store View Rendering — صفحة متجر كاملة
// ═══════════════════════════════════════════════════════════════════════════
function renderStoreView(storeId) {
    const s = ALL.find(x => x.id === storeId);
    if (!s) { goBack(); return; }
    const ST = STRINGS[LANG_CURRENT];
    document.getElementById('storeBackLbl').textContent = ST.home;
    const logoSrc = (s.logo || 'logo.png').replace(/"/g, '&quot;');
    const tagsHtml = (s.tags || []).length
        ? `<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px">${
              s.tags.map(t=>`<span style="font-size:10px;padding:4px 10px;border-radius:10px;background:rgba(16,185,129,0.1);color:var(--em);border:1px solid rgba(16,185,129,0.25)">#${t}</span>`).join('')
          }</div>`
        : '';
    window._activeStore = s;

    document.getElementById('storeBody').innerHTML = `
    <div class="store-hero">
        <img src="${logoSrc}" alt="${s.store_id}" onerror="this.onerror=null;this.src='logo.png'">
        <h2>${s.store_id}${s.trending ? ' 🔥' : ''}</h2>
        ${s.bio ? `<p>${s.bio}</p>` : ''}
        ${tagsHtml}
    </div>
    <div class="coupon-box" onclick="copyCurrent()">
        <div class="lbl">${ST.copyHint}</div>
        <div class="code">${s.coupon || ST.noCoupon}</div>
    </div>
    <div class="cta-row">
        <button class="cta-primary" onclick="openLinkCurrent()">${ST.goToStore}</button>
    </div>
    <div class="store-meta">
        ${LANG_CURRENT==='en' ? 'Discount' : 'الخصم'}: <b style="color:var(--em)">${s.disc}</b>
    </div>`;
}

// ── Force-Fetch loader — multiple cache-busting layers ─────────────────────
// طبقات منع الـ cache:
//   1. ?t={Date.now()} + ?r={random} على URL (يمنع HTTP cache + Service Worker)
//   2. cache: 'no-store' (يمنع HTTP cache على مستوى fetch)
//   3. headers: Cache-Control/Pragma صريحة (يمنع reverse-proxy cache)
//   4. console.log واضح يطبع timestamp + count لتأكيد كل تحميل من جديد
// ملاحظة: لو البيانات ما تتحدث رغم كل ذلك، المشكلة في الـ DB نفسها وليست
// في الـ frontend cache. افحص /api/v1/coupons في متصفّح خارجي مباشرةً.
async function loadData() {
    const t0 = Date.now();
    const url = `${API_BASE}/coupons/?limit=50&lang=${LANG_CURRENT}&t=${t0}&r=${Math.random().toString(36).slice(2,10)}`;

    try {
        const res = await fetch(url, {
            method: 'GET',
            cache: 'no-store',
            credentials: 'omit',
            headers: {
                'Cache-Control': 'no-cache, no-store, must-revalidate, max-age=0',
                'Pragma': 'no-cache',
                'Accept': 'application/json',
            },
        });

        if (!res.ok) {
            console.error('[loadData] HTTP', res.status, res.statusText);
            showToast(S.fetchErr);
            return;
        }

        const payload = await res.json();
        const items = payload.results || [];

        // ── منطق الـ link (يعالج البيانات الفاسدة بأمان) ────────────────
        // أولوية:
        //   1. cloaked_slug → /go/{slug} (مُتتبَّع + bot challenge عبر Cloudflare)
        //   2. affiliate_link لو URL سليم (يبدأ بـ http)
        //   3. # fallback (يفتح نفس الصفحة — تجنّب JS exceptions)
        const buildLink = (item) => {
            if (item.cloaked_slug) {
                return `${window.location.origin}/go/${item.cloaked_slug}`;
            }
            const raw = (item.affiliate_link || '').trim();
            if (raw.startsWith('http://') || raw.startsWith('https://')) {
                return raw;
            }
            return '#';   // لا nav إذا الرابط فاسد — نعرض toast بدل
        };

        ALL = items.map(item => ({
            id: item.id,
            store_id: item.store_id || (LANG_CURRENT === 'en' ? 'Store' : 'متجر'),
            disc: item.discount_value || (LANG_CURRENT === 'en' ? 'Special offer' : 'خصم خاص'),
            coupon: item.public_coupon || '',
            link: buildLink(item),
            logo: item.logo_url || 'logo.png',
            bio: item.store_bio || '',
            trending: item.is_trending === 'ترند 🔥',
            // store_tags array (يأتي مُسطّحاً من الـ API) — يدعم الفلترة بالقسم
            tags: Array.isArray(item.store_tags) ? item.store_tags
                  : (Array.isArray(item.store_tags_en) ? item.store_tags_en : []),
        }));

        const dt = Date.now() - t0;
        console.log(`[loadData] OK · ${ALL.length} stores · ${dt}ms · ${new Date().toISOString()}`);
        const dbgEl = document.getElementById('lastSync');
        if (dbgEl) {
            const hh = new Date().toLocaleTimeString(LANG_CURRENT === 'en' ? 'en-US' : 'ar-SA');
            dbgEl.textContent = `↻ ${hh} · ${ALL.length}`;
        }

        renderStores();
        updateStats();
    } catch (err) {
        console.error('[loadData] failed:', err);
        showToast(STRINGS[LANG_CURRENT].fetchErr);
    }
}

// ── Tracking helper (best-effort, non-blocking) ──────────────────────────
// يستدعي /api/v1/track عند نسخ كوبون أو نقر رابط — تُحقن مرّة واحدة لكل
// حدث ولا تعطّل التجربة لو فشل التتبّع.
async function trackEvent(store_id, action) {
    try {
        const eventId = (crypto.randomUUID && crypto.randomUUID()) ||
                        (Date.now() + '-' + Math.random().toString(36).slice(2, 10));
        fetch(`${API_BASE}/track`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: tgUserId,
                store_id: store_id,
                action: action,                // 'click_link' | 'copy_coupon'
                source: 'telegram_miniapp',
                event_id: eventId
            }),
            keepalive: true                    // يُكمل الطلب حتى لو أُغلقت الواجهة
        }).catch(() => {});
    } catch (e) { /* silent */ }
}

function updateStats() {
    // 3 ستات بنفس ترتيب الموقع: ترند / قسم / متجر
    document.getElementById('sTrend').textContent  = ALL.filter(x => x.trending).length;
    document.getElementById('sCats').textContent   = CATS.length;
    document.getElementById('sStores').textContent = ALL.length;
}

function updateSectionTitle() {
    const ST = STRINGS[LANG_CURRENT];
    const el = document.getElementById('sectionTitle');
    if (!el) return;
    if (activeFilter === 'trending') el.textContent = ST.sectionTrend;
    else if (activeFilter && activeFilter.startsWith('cat:'))
        el.textContent = ST.sectionCat + activeFilter.slice(4);
    else el.textContent = ST.sectionAll;
}

function renderStores() {
    updateSectionTitle();
    const grid = document.getElementById('storesGrid');
    // الفلتر: 1) tab النشط (trending/cat)  2) بحث نصي على الاسم/bio/tags
    const catFilter = (activeFilter && activeFilter.startsWith('cat:'))
                      ? activeFilter.slice(4) : null;
    const filtered = ALL.filter(s => {
        if (activeFilter === 'trending' && !s.trending) return false;
        if (catFilter && !(s.tags || []).map(t=>String(t).trim()).includes(catFilter)) return false;
        const hay = (s.store_id + ' ' + (s.bio || '') + ' ' + (s.tags || []).join(' ')).toLowerCase();
        return hay.includes(activeSearch);
    });

    if (!filtered.length) {
        const isEn = LANG_CURRENT === 'en';
        let emptyMsg;
        if (activeFilter === 'trending') emptyMsg = isEn ? 'No trending stores right now.' : 'لا توجد متاجر رائجة حالياً.';
        else if (catFilter) emptyMsg = isEn ? `No stores in this category yet.` : `لا توجد متاجر في هذا القسم بعد.`;
        else emptyMsg = isEn ? 'No matching stores. Try another search.' : 'لا توجد نتائج مطابقة. جرّب كلمة أخرى.';
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--t3);padding:40px 20px;font-size:13px">${emptyMsg}</div>`;
        return;
    }

    grid.innerHTML = filtered.map(storeCardHTML).join('');
}

// Legacy openStore — أعيد توجيهها للـ inline view الجديد. لا modal بعد الآن.
function openStore(id) { showStoreView(id); }

function copyCurrent() {
    const s = window._activeStore;
    if (!s || !s.coupon) { showToast(S.noCoupon); return; }
    copyText(s.coupon);
    trackEvent(s.store_id, 'copy_coupon');
}

function openLinkCurrent() {
    const s = window._activeStore;
    if (!s) return;
    // حماية: لو الـ link فاسد (#) لا نفتح أي شيء — نعرض toast بدلاً.
    if (!s.link || s.link === '#') {
        showToast(LANG_CURRENT === 'en' ? 'Link unavailable' : 'الرابط غير متوفّر');
        return;
    }
    trackEvent(s.store_id, 'click_link');
    // مسار واحد فقط: s.link الذي بُني في loadData (يحترم cloaked_slug + يصفّي URL فاسد).
    // ملاحظة: الـ API لا يُرجع حقل اسمه original_link — أي مرجع له خطأ تاريخي.
    if (tg && tg.openLink) {
        tg.openLink(s.link);
    } else {
        window.open(s.link, '_blank');
    }
}

function copyText(txt) {
    // Telegram WebApp قد لا يدعم navigator.clipboard في كل الإصدارات — نضمن fallback
    try {
        navigator.clipboard.writeText(txt);
    } catch (e) {
        const ta = document.createElement('textarea');
        ta.value = txt; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    }
    showToast(S.copied);
}

function onSearch(v) {
    activeSearch = v.toLowerCase();
    renderStores();
}

// closeModal: لم يعد مستخدماً (لا modal). محفوظ كـ no-op للـ backward compat.
function closeModal() {
    const o = document.getElementById('overlay');
    if (o) o.classList.remove('on');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('on');
    setTimeout(() => t.classList.remove('on'), 2500);
}

async function refreshData() {
    showToast(S.refreshing);
    await loadData();
}

// ── Filter Home grid: 'all' | 'trending' فقط (لا cat — categories تفتح view) ──
function setFilter(mode) {
    activeFilter = mode;
    if (currentView !== 'home') switchView('home');  // أرجع للـ home لو في sub-view
    renderCategoryChips();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    renderStores();
}

// ── Visibility change: عند العودة لـ Mini App بعد فتحه، أعد التحميل ────
document.addEventListener('visibilitychange', () => {
    if (!document.hidden) { loadData(); loadCategories(); }
});

// Telegram BackButton — onClick يستدعي goBack محلي (لا يُغلق Mini App)
if (tg && tg.BackButton && typeof tg.BackButton.onClick === 'function') {
    tg.BackButton.onClick(() => goBack());
}

// إقلاع: home view + تحميل البيانات + الأقسام بالتوازي
document.addEventListener('DOMContentLoaded', () => {
    switchView('home');
    loadCategories();
    loadData();
});
</script>
