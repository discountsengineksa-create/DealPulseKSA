<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<!-- Cache busting: Telegram WebView يحفظ نسخة آخر فتح بقوّة — هذه الـ headers
     مع version param في fetches أدناه تضمن أن المستخدم يرى أحدث محتوى دائماً. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>نبض الصفقات | Deal Pulse KSA</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES ── */
:root {
  --bg:          #080E1D;
  --bg2:         #0C1527;
  --card:        rgba(255,255,255,0.04);
  --card-h:      rgba(255,255,255,0.08);
  --border:      rgba(255,255,255,0.08);
  --blur:        blur(22px);
  --em:          #10B981;
  --em2:         #059669;
  --em-glow:     rgba(16,185,129,0.20);
  --t1:          #F1F5F9;
  --t2:          rgba(241,245,249,0.70);
  --t3:          rgba(241,245,249,0.40);
  --grad-bg:     linear-gradient(160deg,#080E1D 0%,#0C1527 45%,#0F2040 100%);
  --font:        'Cairo', -apple-system, sans-serif;
}

/* ── RESET & BASE ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{
  font-family:var(--font);
  background:var(--grad-bg);
  color:var(--t1);
  min-height:100vh;
  overflow-x:hidden;
  overflow-y:auto;
  padding-bottom:calc(80px + env(safe-area-inset-bottom,16px));
}

.glass{ background:var(--card); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border); }

/* ── HEADER ── */
.hdr{ position:sticky;top:0;z-index:100; padding:15px 18px; background:linear-gradient(180deg,var(--bg) 60%,transparent); }
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.logo{display:flex;align-items:center;gap:12px}
.logo-img{ width:45px; height:45px; object-fit: contain; }
.logo-txt h1{font-size:16px;font-weight:900;color:var(--t1);line-height:1.2}
.logo-txt p{font-size:10px;font-weight:700;color:var(--em);letter-spacing:1px}

/* ── SEARCH ── */
.srch-wrap{position:relative}
.srch{ width:100%; padding:14px 44px 14px 18px; border-radius:15px; font-family:var(--font);font-size:14px; color:var(--t1); border:1px solid var(--border); outline:none; transition:0.3s; }
.srch:focus{border-color:var(--em); background:rgba(255,255,255,0.08)}
.srch-ico{ position:absolute; top:50%; transform:translateY(-50%); opacity:0.4; }
html[dir="rtl"] .srch-ico{ right:15px; }
html[dir="ltr"] .srch-ico{ left:15px; }
html[dir="ltr"] .srch{ padding:14px 18px 14px 44px; }

/* ── STATS ── */
.stats{display:flex;gap:10px;padding:0 18px}
.stat{ flex:1;padding:15px;border-radius:18px;text-align:center; }
.stat-v{font-size:20px;font-weight:900;color:var(--em)}
.stat-l{font-size:11px;color:var(--t3);margin-top:4px}

/* ── CARDS GRID ── */
.stores{padding:25px 18px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
.card{ border-radius:20px; padding:15px; cursor:pointer; transition:0.3s cubic-bezier(0.4,0,0.2,1); }
.card:active{transform:scale(0.95)}

.c-ava {
    width: 100%;
    height: 90px;
    background: rgba(255,255,255,0.03);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    overflow: hidden;
}
.c-ava img {
    max-width: 80%;
    max-height: 80%;
    object-fit: contain;
}

.c-name{font-size:14px;font-weight:800;color:var(--t1);margin-bottom:6px;text-align:center}
.disc-badge{
    display:block; text-align:center; padding:6px; border-radius:10px;
    background:rgba(16,185,129,0.1); color:var(--em); font-size:11px; font-weight:800;
    border: 1px solid rgba(16,185,129,0.2);
}

.c-foot{display:flex;justify-content:center;margin-top:12px}
.go-lbl{font-size:11px;color:var(--t3);font-weight:600;border-bottom:1px solid var(--border)}

/* ── MODAL ── */
.overlay{ position:fixed;inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(10px); z-index:200; display:flex;align-items:flex-end; opacity:0;pointer-events:none; transition:0.3s; }
.overlay.on{opacity:1;pointer-events:all}
.sheet{ width:100%; background:var(--bg2); border-radius:28px 28px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); transform:translateY(100%); transition:0.4s cubic-bezier(0.32,0.72,0,1); border-top:1px solid var(--border); }
.overlay.on .sheet{transform:translateY(0)}
.m-ava-big{ width:80px; height:80px; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.05); border-radius:20px; }
.m-ava-big img{ width:70%; }
.cpn-box{
    margin:20px 0; padding:20px; border-radius:18px; border:2px dashed var(--em);
    text-align:center; background:rgba(16,185,129,0.05); cursor:pointer;
}
.big-cpn{font-size:24px;font-weight:900;color:var(--em);letter-spacing:4px;font-family:monospace}
.btn-p{ width:100%; padding:16px; border-radius:15px; background:var(--em); color:#fff; border:none; font-weight:800; font-size:16px; cursor:pointer; }

/* ── NAV ── */
.bnav{ position:fixed;bottom:0;width:100%; padding:12px 20px calc(12px + env(safe-area-inset-bottom)); display:flex;justify-content:space-around; background:rgba(8,14,29,0.8); border-top:1px solid var(--border); z-index:150; }
.nitem{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--t3);text-decoration:none;font-size:10px;font-weight:700}
.nitem.on{color:var(--em)}

.toast{ position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:12px 24px; background:var(--em); color:#fff; border-radius:50px; font-weight:700; z-index:400; opacity:0; transition:0.3s; }
.toast.on{opacity:1; top:40px}
</style>
</head>

<body>
<div class="toast" id="toast"></div>

<header class="hdr">
  <div class="hdr-row">
    <div class="logo">
      <img src="logo.png" class="logo-img" alt="Logo">
      <div class="logo-txt"><h1 id="brandName">نبض الصفقات</h1><p>DEAL PULSE KSA</p></div>
    </div>
    <button class="glass" id="refreshBtn" style="padding:8px 15px; border-radius:10px; color:var(--t2); border:none;" onclick="refreshData()">تحديث</button>
  </div>
  <div class="srch-wrap">
    <input class="srch glass" id="srchInput" type="text" placeholder="ابحث عن متجر أو كوبون..." oninput="onSearch(this.value)">
    <span class="srch-ico">🔍</span>
  </div>
</header>

<main>
  <div class="stats">
    <div class="stat glass"><div class="stat-v" id="sStores">0</div><div class="stat-l" id="lblStores">متجر</div></div>
    <div class="stat glass"><div class="stat-v" id="sCoupons">0</div><div class="stat-l" id="lblCoupons">كوبون</div></div>
    <div class="stat glass"><div class="stat-v" id="sTrend">0</div><div class="stat-l" id="lblTrend">رائج</div></div>
  </div>

  <div class="stores">
    <div class="grid" id="storesGrid"></div>
  </div>
</main>

<div class="overlay" id="overlay" onclick="if(event.target.id=='overlay')closeModal()">
  <div class="sheet" id="sheet">
    <div id="mBody"></div>
  </div>
</div>

<nav class="bnav glass">
  <!-- 3 tabs مُوحَّدة مع مسارات الموقع dealpulseksa.com:
       • الرئيسية   → عرض كل المتاجر (filter محلي = all)
       • الترند     → عرض المتاجر الرائجة فقط (filter محلي = trending)
       • الموقع    → يفتح dealpulseksa.com/stores خارجياً (full experience)  -->
  <a href="#" class="nitem on" id="navHomeTab" onclick="event.preventDefault();setFilter('all')"><span id="navHome">الرئيسية</span></a>
  <a href="#" class="nitem" id="navTrendTab" onclick="event.preventDefault();setFilter('trending')"><span id="navFav">الترند 🔥</span></a>
  <a href="#" class="nitem" onclick="event.preventDefault();openWebSite()"><span id="navMe">الموقع 🌐</span></a>
</nav>

<script>
// ── Telegram WebApp integration (ready/expand/theme) ─────────────────────
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  try {
    tg.ready();        // يُعلم Telegram أن التطبيق محمّل (يخفي شاشة التحميل)
    tg.expand();       // يفتح كامل الشاشة (vs نصف الشاشة الافتراضي)
    tg.enableClosingConfirmation();  // يطلب تأكيد قبل الإغلاق
    // theme: ندمج لون header مع gradient التطبيق
    if (tg.setHeaderColor) tg.setHeaderColor('#080E1D');
    if (tg.setBackgroundColor) tg.setBackgroundColor('#080E1D');
  } catch (e) { /* تجاهل لو نسخة قديمة من Telegram */ }
}

const tgUserId = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) || null;
const tgLangCode = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.language_code) || '';
const LANG = tgLangCode.toLowerCase().startsWith('en') ? 'en' : 'ar';

// ── Strings dict (UI labels — server returns content already lang-substituted) ──
const STRINGS = {
  ar: {
    brand:           'نبض الصفقات',
    refresh:         'تحديث',
    refreshing:      '🔄 جاري التحديث...',
    searchHolder:    'ابحث عن متجر أو كوبون...',
    stores:          'متجر',
    coupons:         'كوبون',
    trending:        'رائج',
    detailsLabel:    'تفاصيل العرض',
    copyHint:        'إضغط لنسخ الكود',
    noCoupon:        'لا يوجد كود',
    goToStore:       'الانتقال للمتجر',
    close:           'إغلاق',
    copied:          '✅ تم نسخ الكود بنجاح',
    fetchErr:        '❌ عذراً، تعذر تحديث البيانات',
    home:            'الرئيسية',
    fav:             'المفضلة',
    me:              'حسابي',
    title:           'نبض الصفقات | Deal Pulse KSA',
  },
  en: {
    brand:           'Deal Pulse',
    refresh:         'Refresh',
    refreshing:      '🔄 Refreshing...',
    searchHolder:    'Search for a store or coupon...',
    stores:          'Stores',
    coupons:         'Coupons',
    trending:        'Trending',
    detailsLabel:    'View offer',
    copyHint:        'Tap to copy code',
    noCoupon:        'No code',
    goToStore:       'Go to store',
    close:           'Close',
    copied:          '✅ Code copied successfully',
    fetchErr:        '❌ Sorry, failed to refresh data',
    home:            'Home',
    fav:             'Favorites',
    me:              'Account',
    title:           'Deal Pulse KSA',
  }
};
const S = STRINGS[LANG];

// ── Apply direction + static labels at boot ─────────────────────────────
(function applyLang() {
  document.documentElement.lang = LANG;
  document.documentElement.dir  = (LANG === 'en') ? 'ltr' : 'rtl';
  document.body.style.direction = (LANG === 'en') ? 'ltr' : 'rtl';
  document.title = S.title;
  document.getElementById('brandName').textContent      = S.brand;
  document.getElementById('refreshBtn').textContent     = S.refresh;
  document.getElementById('srchInput').placeholder      = S.searchHolder;
  document.getElementById('lblStores').textContent      = S.stores;
  document.getElementById('lblCoupons').textContent     = S.coupons;
  document.getElementById('lblTrend').textContent       = S.trending;
  document.getElementById('navHome').textContent        = S.home;
  document.getElementById('navFav').textContent         = S.fav;
  document.getElementById('navMe').textContent          = S.me;
})();

// ── Unified Source of Truth ─────────────────────────────────────────────
// API_BASE: نفس الـ API الذي يستهلكه الموقع (api.dealpulseksa.com) — لا
// fetches محلية ولا fallbacks. window.location.origin يكفل الاتساق سواء
// كان الـ Mini App مُخدّماً من api.dealpulseksa.com أو من Railway URL.
const API_BASE = window.location.origin + '/api/v1';
// WEB_BASE: الموقع الرسمي — وجهة "صفحة المتجر الكاملة" والـ nav tabs.
// يفتح خارج Mini App عبر tg.openLink() ليبقى Mini App مفتوحاً للعودة.
const WEB_BASE = 'https://www.dealpulseksa.com';

// activeFilter: 'all' | 'trending' — يتحكم بالـ nav tabs محلياً بدون reload
let ALL = [];
let activeSearch = '';
let activeFilter = 'all';

async function loadData() {
    try {
        // ?_=timestamp يمنع Telegram WebView من إعادة استخدام نسخة قديمة من
        // الـ response. الـ API نفسه يحترم Cache-Control headers.
        const cacheBust = Date.now();
        const res = await fetch(
            `${API_BASE}/coupons/?limit=50&lang=${LANG}&_=${cacheBust}`,
            { cache: 'no-store' }
        );
        const payload = await res.json();
        const items = payload.results || [];

        ALL = items.map(item => ({
            id: item.id,
            store_id: item.store_id || (LANG === 'en' ? 'Store' : 'متجر'),
            disc: item.discount_value || (LANG === 'en' ? 'Special offer' : 'خصم خاص'),
            coupon: item.public_coupon || '',
            // نُفضّل /go/{cloaked_slug} (يمر بـ Cloudflare Worker للإحصاء + bot challenge)
            // ثم نسقط للـ affiliate_link المباشر لو ما في cloaked
            link: item.cloaked_slug
                  ? `${window.location.origin}/go/${item.cloaked_slug}`
                  : (item.affiliate_link || '#'),
            // شعار المتجر الفردي — يسقط لـ logo.png لو ناقص
            logo: item.logo_url || 'logo.png',
            bio: item.store_bio || '',
            trending: item.is_trending === 'ترند 🔥'
        }));

        renderStores();
        updateStats();
    } catch (err) {
        showToast(S.fetchErr);
    }
}

// ── Tracking helper (best-effort, non-blocking) ──────────────────────────
// يستدعي /api/v1/track عند نسخ كوبون أو نقر رابط — تُحقن مرّة واحدة لكل
// حدث ولا تعطّل التجربة لو فشل التتبّع.
async function trackEvent(store_id, action) {
    try {
        const eventId = (crypto.randomUUID && crypto.randomUUID()) ||
                        (Date.now() + '-' + Math.random().toString(36).slice(2, 10));
        fetch(`${API_BASE}/track`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: tgUserId,
                store_id: store_id,
                action: action,                // 'click_link' | 'copy_coupon'
                source: 'telegram_miniapp',
                event_id: eventId
            }),
            keepalive: true                    // يُكمل الطلب حتى لو أُغلقت الواجهة
        }).catch(() => {});
    } catch (e) { /* silent */ }
}

function updateStats() {
    document.getElementById('sStores').textContent = ALL.length;
    document.getElementById('sCoupons').textContent = ALL.filter(x => x.coupon).length;
    document.getElementById('sTrend').textContent = ALL.filter(x => x.trending).length;
}

function renderStores() {
    const grid = document.getElementById('storesGrid');
    // البحث يشمل: الاسم + الوصف (الـ bio) + Filter حسب الـ tab النشط
    const filtered = ALL.filter(s => {
        if (activeFilter === 'trending' && !s.trending) return false;
        const hay = (s.store_id + ' ' + (s.bio || '')).toLowerCase();
        return hay.includes(activeSearch);
    });

    if (!filtered.length) {
        const emptyMsg = activeFilter === 'trending'
            ? (LANG === 'en' ? 'No trending stores right now.' : 'لا توجد متاجر رائجة حالياً.')
            : (LANG === 'en' ? 'No matching stores. Try another search.' : 'لا توجد نتائج مطابقة. جرّب كلمة أخرى.');
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--t3);padding:40px 20px;font-size:13px">${emptyMsg}</div>`;
        return;
    }

    grid.innerHTML = filtered.map(s => {
        const trendBadge = s.trending
            ? `<span style="position:absolute;top:8px;${LANG==='en'?'right':'left'}:8px;background:rgba(239,68,68,0.18);color:#FCA5A5;font-size:10px;font-weight:800;padding:3px 8px;border-radius:8px;border:1px solid rgba(239,68,68,0.3)">🔥 ${S.trending}</span>`
            : '';
        // onerror يسقط لـ logo.png فقط لو فشل تحميل logo_url
        const logoSrc = (s.logo || 'logo.png').replace(/"/g, '&quot;');
        return `
        <div class="card glass" style="position:relative" onclick="openStore(${s.id})">
            ${trendBadge}
            <div class="c-ava"><img src="${logoSrc}" alt="${s.store_id}" onerror="this.onerror=null;this.src='logo.png'"></div>
            <div class="c-name">${s.store_id}</div>
            <div class="disc-badge">${s.disc}</div>
            <div class="c-foot"><span class="go-lbl">${S.detailsLabel}</span></div>
        </div>
    `;}).join('');
}

function openStore(id) {
    const s = ALL.find(x => x.id === id);
    if(!s) return;

    const logoSrc = (s.logo || 'logo.png').replace(/"/g, '&quot;');
    // نخزّن المتجر الحالي للوصول إليه من copyCurrent/openLinkCurrent بدون تمرير quoted strings
    window._activeStore = s;

    document.getElementById('mBody').innerHTML = `
        <div class="m-ava-big"><img src="${logoSrc}" alt="${s.store_id}" onerror="this.onerror=null;this.src='logo.png'"></div>
        <h2 style="text-align:center; margin-bottom:5px;">${s.store_id}${s.trending ? ' 🔥' : ''}</h2>
        <p style="text-align:center; color:var(--t3); font-size:12px; margin-bottom:20px;">${s.bio || ''}</p>

        <div class="cpn-box" onclick="copyCurrent()">
            <div style="font-size:10px; color:var(--t3); margin-bottom:5px;">${S.copyHint}</div>
            <div class="big-cpn">${s.coupon || S.noCoupon}</div>
        </div>

        <button class="btn-p" onclick="openLinkCurrent()">${S.goToStore}</button>
        <button class="glass" style="width:100%; padding:14px; margin-top:10px; border-radius:15px; color:var(--em); border:1px solid rgba(16,185,129,0.3);" onclick="openStorePageOnSite()">${LANG==='en'?'View on site':'صفحة المتجر على الموقع'}</button>
        <button class="glass" style="width:100%; padding:14px; margin-top:10px; border-radius:15px; color:var(--t2); border:none;" onclick="closeModal()">${S.close}</button>
    `;
    document.getElementById('overlay').classList.add('on');
}

function openStorePageOnSite() {
    // يفتح صفحة المتجر الكاملة على dealpulseksa.com — نمط المسار: /store/{store_id}
    // (singular — تأكدت من فحص live: GET /store/X → 200، GET /stores/X → 404)
    const s = window._activeStore;
    if (!s) return;
    const url = `${WEB_BASE}/store/${encodeURIComponent(s.store_id)}`;
    if (tg && tg.openLink) tg.openLink(s.original_link);
    else window.open(s.original_link, '_blank');
}

function copyCurrent() {
    const s = window._activeStore;
    if (!s || !s.coupon) { showToast(S.noCoupon); return; }
    copyText(s.coupon);
    trackEvent(s.store_id, 'copy_coupon');
}

function openLinkCurrent() {
    const s = window._activeStore;
    if (!s) return;
    trackEvent(s.store_id, 'click_link');
    // Telegram WebApp يفتح روابط خارجية بشكل خاص
    if (tg && tg.openLink) {
        tg.openLink(s.link);
    } else {
        window.open(s.link, '_blank');if (tg && tg.openLink) tg.openLink(s.original_link);
        else window.open(s.original_link, '_blank');
    }
}

function copyText(txt) {
    // Telegram WebApp قد لا يدعم navigator.clipboard في كل الإصدارات — نضمن fallback
    try {
        navigator.clipboard.writeText(txt);
    } catch (e) {
        const ta = document.createElement('textarea');
        ta.value = txt; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    }
    showToast(S.copied);
}

function onSearch(v) {
    activeSearch = v.toLowerCase();
    renderStores();
}

function closeModal() { document.getElementById('overlay').classList.remove('on'); }

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('on');
    setTimeout(() => t.classList.remove('on'), 2500);
}

async function refreshData() {
    showToast(S.refreshing);
    await loadData();
}

// ── Nav tabs: filter محلي بدون reload ──────────────────────────────────
function setFilter(mode) {
    activeFilter = mode;                          // 'all' | 'trending'
    document.getElementById('navHomeTab').classList.toggle('on', mode === 'all');
    document.getElementById('navTrendTab').classList.toggle('on', mode === 'trending');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    renderStores();
}

function openWebSite() {
    // يفتح قائمة المتاجر على الموقع — تجربة كاملة (مفضّلة + تسجيل دخول).
    const url = `${WEB_BASE}/stores`;
    if (tg && tg.openLink) tg.openLink(url);
    else window.open(url, '_blank');
}

// ── Visibility change: عند العودة لـ Mini App بعد فتحه، أعد التحميل ────
// Telegram WebView لا يُطلق unload فعلياً عند الـ minimize. visibilitychange
// يطلق على iOS/Android حين يعود المستخدم للتطبيق.
document.addEventListener('visibilitychange', () => {
    if (!document.hidden) loadData();             // silent refresh
});

document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
