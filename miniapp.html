<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<!-- Cache busting: Telegram WebView يحفظ نسخة آخر فتح بقوّة — هذه الـ headers
     مع version param في fetches أدناه تضمن أن المستخدم يرى أحدث محتوى دائماً. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>نبض الصفقات | Deal Pulse KSA</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES ── */
:root {
  --bg:          #080E1D;
  --bg2:         #0C1527;
  --card:        rgba(255,255,255,0.04);
  --card-h:      rgba(255,255,255,0.08);
  --border:      rgba(255,255,255,0.08);
  --blur:        blur(22px);
  --em:          #10B981;
  --em2:         #059669;
  --em-glow:     rgba(16,185,129,0.20);
  --t1:          #F1F5F9;
  --t2:          rgba(241,245,249,0.70);
  --t3:          rgba(241,245,249,0.40);
  --grad-bg:     linear-gradient(160deg,#080E1D 0%,#0C1527 45%,#0F2040 100%);
  --font:        'Cairo', -apple-system, sans-serif;
}

/* ── RESET & BASE ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
/* ⚠️ مهم: html بدون overflow:hidden — كان يمنع التمرير الرأسي على iOS Telegram WebView.
   نتركه يرث overflow الافتراضي + ندعم safe-area للأجهزة ذات الـ notch. */
html{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
body{
  font-family:var(--font);
  background:var(--grad-bg);
  color:var(--t1);
  min-height:100vh;
  overflow-x:hidden;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(90px + env(safe-area-inset-bottom,16px));
}

.glass{ background:var(--card); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border); }

/* ── HEADER ── */
.hdr{ position:sticky;top:0;z-index:100; padding:15px 18px; background:linear-gradient(180deg,var(--bg) 60%,transparent); }
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.logo{display:flex;align-items:center;gap:12px}
.logo-img{ width:45px; height:45px; object-fit: contain; }
.logo-txt h1{font-size:16px;font-weight:900;color:var(--t1);line-height:1.2}
.logo-txt p{font-size:10px;font-weight:700;color:var(--em);letter-spacing:1px}

/* ── SEARCH ── */
.srch-wrap{position:relative}
.srch{ width:100%; padding:14px 44px 14px 18px; border-radius:15px; font-family:var(--font);font-size:14px; color:var(--t1); border:1px solid var(--border); outline:none; transition:0.3s; }
.srch:focus{border-color:var(--em); background:rgba(255,255,255,0.08)}
.srch-ico{ position:absolute; top:50%; transform:translateY(-50%); opacity:0.4; }
html[dir="rtl"] .srch-ico{ right:15px; }
html[dir="ltr"] .srch-ico{ left:15px; }
html[dir="ltr"] .srch{ padding:14px 18px 14px 44px; }

/* ── STATS ── */
.stats{display:flex;gap:10px;padding:0 18px}
.stat{ flex:1;padding:15px;border-radius:18px;text-align:center; }
.stat-v{font-size:20px;font-weight:900;color:var(--em)}
.stat-l{font-size:11px;color:var(--t3);margin-top:4px}

/* ── CARDS GRID ── */
.stores{padding:25px 18px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
.card{ border-radius:20px; padding:15px; cursor:pointer; transition:0.3s cubic-bezier(0.4,0,0.2,1); }
.card:active{transform:scale(0.95)}

.c-ava {
    width: 100%;
    height: 90px;
    background: rgba(255,255,255,0.03);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
    overflow: hidden;
}
.c-ava img {
    max-width: 80%;
    max-height: 80%;
    object-fit: contain;
}

.c-name{font-size:14px;font-weight:800;color:var(--t1);margin-bottom:6px;text-align:center}
.disc-badge{
    display:block; text-align:center; padding:6px; border-radius:10px;
    background:rgba(16,185,129,0.1); color:var(--em); font-size:11px; font-weight:800;
    border: 1px solid rgba(16,185,129,0.2);
}

.c-foot{display:flex;justify-content:center;margin-top:12px}
.go-lbl{font-size:11px;color:var(--t3);font-weight:600;border-bottom:1px solid var(--border)}

/* ── MODAL ── */
.overlay{ position:fixed;inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(10px); z-index:200; display:flex;align-items:flex-end; opacity:0;pointer-events:none; transition:0.3s; }
.overlay.on{opacity:1;pointer-events:all}
.sheet{ width:100%; background:var(--bg2); border-radius:28px 28px 0 0; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); transform:translateY(100%); transition:0.4s cubic-bezier(0.32,0.72,0,1); border-top:1px solid var(--border); }
.overlay.on .sheet{transform:translateY(0)}
.m-ava-big{ width:80px; height:80px; margin:0 auto 15px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.05); border-radius:20px; }
.m-ava-big img{ width:70%; }
.cpn-box{
    margin:20px 0; padding:20px; border-radius:18px; border:2px dashed var(--em);
    text-align:center; background:rgba(16,185,129,0.05); cursor:pointer;
}
.big-cpn{font-size:24px;font-weight:900;color:var(--em);letter-spacing:4px;font-family:monospace}
.btn-p{ width:100%; padding:16px; border-radius:15px; background:var(--em); color:#fff; border:none; font-weight:800; font-size:16px; cursor:pointer; }

/* ── NAV ── */
.bnav{ position:fixed;bottom:0;width:100%; padding:12px 20px calc(12px + env(safe-area-inset-bottom)); display:flex;justify-content:space-around; background:rgba(8,14,29,0.8); border-top:1px solid var(--border); z-index:150; }
.nitem{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--t3);text-decoration:none;font-size:10px;font-weight:700}
.nitem.on{color:var(--em)}

.toast{ position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:12px 24px; background:var(--em); color:#fff; border-radius:50px; font-weight:700; z-index:400; opacity:0; transition:0.3s; }
.toast.on{opacity:1; top:40px}

/* ── PROFILE MODAL (إلزامي — gender + birth_date) ── */
.pf-overlay{ z-index:500; align-items:center; justify-content:center; }
.pf-sheet{ width:calc(100% - 32px); max-width:420px; background:var(--bg2); border-radius:24px; padding:24px 22px;
  border:1px solid var(--border); transform:translateY(20px); opacity:0; transition:0.3s cubic-bezier(0.32,0.72,0,1); }
.pf-overlay.on .pf-sheet{ transform:translateY(0); opacity:1; }
.pf-title{ font-size:18px; font-weight:900; color:var(--t1); text-align:center; margin-bottom:6px; }
.pf-subtitle{ font-size:12px; color:var(--t2); text-align:center; margin-bottom:20px; line-height:1.5; }
.pf-label{ font-size:11px; font-weight:700; color:var(--t2); margin-bottom:8px; display:block; }
.pf-row{ margin-bottom:16px; }
.pf-gender-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.pf-gender-btn{ padding:14px; border-radius:14px; background:var(--card); border:1px solid var(--border);
  color:var(--t2); font-family:var(--font); font-weight:800; font-size:14px; cursor:pointer; transition:0.2s; }
.pf-gender-btn.sel{ background:rgba(16,185,129,0.12); border-color:var(--em); color:var(--em); }
.pf-date{ width:100%; padding:14px; border-radius:14px; background:var(--card); border:1px solid var(--border);
  color:var(--t1); font-family:var(--font); font-size:14px; outline:none; }
.pf-date:focus{ border-color:var(--em); }
.pf-error{ color:#f87171; font-size:12px; margin:8px 0; min-height:18px; text-align:center; }
.pf-submit{ width:100%; padding:15px; border-radius:14px; background:var(--em); color:#fff; border:none;
  font-family:var(--font); font-weight:800; font-size:15px; cursor:pointer; transition:0.2s; }
.pf-submit:disabled{ opacity:0.5; cursor:not-allowed; }
</style>
</head>

<body>
<div class="toast" id="toast"></div>

<header class="hdr">
  <div class="hdr-row">
    <div class="logo">
      <img src="logo.png" class="logo-img" alt="Logo">
      <div class="logo-txt">
        <h1 id="brandName">نبض الصفقات</h1>
        <p>DEAL PULSE KSA · <span id="lastSync" style="opacity:0.6;font-size:9px;letter-spacing:0">--</span></p>
      </div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="glass" id="langBtn" title="Language" style="padding:8px 10px; border-radius:10px; color:var(--em); border:none; font-weight:800; font-size:11px;" onclick="toggleLang()">EN</button>
      <button class="glass" id="refreshBtn" style="padding:8px 12px; border-radius:10px; color:var(--t2); border:none;" onclick="refreshData()">تحديث</button>
    </div>
  </div>
  <div class="srch-wrap" id="srchWrap">
    <input class="srch glass" id="srchInput" type="text" placeholder="ابحث عن متجر أو قسم..." oninput="onSearch(this.value)">
    <span class="srch-ico">🔍</span>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════════════════
     VIEW: HOME — الستات + chips الأقسام + grid المتاجر
     ═══════════════════════════════════════════════════════════════════ -->
<main id="viewHome">
  <!-- صف الستوري — المتاجر المروّجة (is_promoted) -->
  <div id="storyRow" class="story-row"></div>

  <div class="stats">
    <div class="stat glass" onclick="showListView('trending')" style="cursor:pointer">
      <div class="stat-v" id="sTrend">0</div><div class="stat-l" id="lblTrend">ترند</div>
    </div>
    <div class="stat glass" onclick="showCategoriesView()" style="cursor:pointer">
      <div class="stat-v" id="sCats">0</div><div class="stat-l" id="lblCats">قسم</div>
    </div>
    <div class="stat glass" onclick="showListView('all')" style="cursor:pointer">
      <div class="stat-v" id="sStores">0</div><div class="stat-l" id="lblStores">متجر</div>
    </div>
  </div>
  <style>
  /* Sub-view (List / Categories / Category / Store) — يستبدل home بالكامل */
  .subview{display:none;padding:18px;animation:slideIn 0.25s ease-out}
  .subview.on{display:block}
  @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .sv-title{font-size:22px;font-weight:900;color:var(--t1);margin-bottom:16px;text-align:center}
  .sv-back{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--em);font-weight:700;font-size:12px;cursor:pointer;margin-bottom:14px}
  .store-hero{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:20px;padding:24px 18px;text-align:center;margin-bottom:16px}
  .store-hero img{width:110px;height:110px;object-fit:contain;background:rgba(255,255,255,0.05);border-radius:18px;padding:8px}
  .store-hero h2{margin:14px 0 6px;font-size:20px;font-weight:900;color:var(--t1)}
  .store-hero p{color:var(--t3);font-size:13px;line-height:1.6}
  .coupon-box{margin:18px 0;padding:24px 16px;border:2px dashed var(--em);border-radius:18px;text-align:center;background:rgba(16,185,129,0.06);cursor:pointer}
  .coupon-box .lbl{font-size:11px;color:var(--t3);margin-bottom:8px;letter-spacing:1px}
  .coupon-box .code{font-size:28px;font-weight:900;color:var(--em);letter-spacing:5px;font-family:monospace}
  .cta-row{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .cta-row button{padding:16px;border-radius:14px;border:none;font-weight:800;font-size:15px;cursor:pointer;font-family:var(--font)}
  .cta-primary{background:var(--em);color:#fff}
  .cta-ghost{background:rgba(255,255,255,0.04);color:var(--t2);border:1px solid var(--border) !important}
  .store-meta{margin-top:18px;padding-top:18px;border-top:1px solid var(--border);font-size:12px;color:var(--t3);text-align:center;line-height:1.8}

  /* ── STORY ROW (دوائر المتاجر المروّجة) ── */
  .story-row{display:flex;gap:14px;padding:14px 18px 4px;overflow-x:auto;scrollbar-width:none}
  .story-row::-webkit-scrollbar{display:none}
  .story-row:empty{display:none}
  .story-item{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;cursor:pointer;background:none;border:none;font-family:var(--font)}
  .story-item:active{transform:scale(0.94)}
  .story-ring{width:66px;height:66px;border-radius:50%;padding:2px;display:grid;place-items:center;
    background:conic-gradient(from 0deg,#10B981,#34D399,#059669,#10B981)}
  .story-ring .inner{width:100%;height:100%;border-radius:50%;background:var(--bg2);overflow:hidden;display:grid;place-items:center;border:2px solid var(--bg)}
  .story-ring img{width:78%;height:78%;object-fit:contain}
  .story-name{font-size:10px;color:var(--t2);max-width:66px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}

  /* ── STORY VIEWER (ملء الشاشة) ── */
  .story-viewer{position:fixed;inset:0;z-index:500;background:rgba(8,14,29,0.96);backdrop-filter:blur(10px);
    display:none;flex-direction:column;align-items:center;justify-content:center}
  .story-viewer.on{display:flex}
  .story-progress{position:absolute;top:calc(10px + env(safe-area-inset-top,0));left:12px;right:12px;z-index:20;display:flex;gap:4px}
  .story-progress .seg{flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,0.25);overflow:hidden}
  .story-progress .seg>i{display:block;height:100%;width:0;background:#fff}
  .story-close{position:absolute;top:calc(20px + env(safe-area-inset-top,0));right:16px;z-index:30;width:36px;height:36px;border-radius:50%;
    background:rgba(255,255,255,0.12);color:#fff;border:none;font-size:16px;cursor:pointer}
  .story-tap{position:absolute;top:0;bottom:90px;width:35%;z-index:10}
  html[dir="rtl"] .story-tap-prev{right:0} html[dir="rtl"] .story-tap-next{left:0}
  html[dir="ltr"] .story-tap-prev{left:0} html[dir="ltr"] .story-tap-next{right:0}
  .story-content{position:relative;z-index:15;width:100%;max-width:420px;padding:0 28px;text-align:center;color:#fff;pointer-events:none}
  .story-content .s-logo{width:130px;height:130px;margin:0 auto 22px;border-radius:22px;background:#fff;overflow:hidden;display:grid;place-items:center}
  .story-content .s-logo img{width:80%;height:80%;object-fit:contain}
  .story-content h3{font-size:24px;font-weight:900;margin-bottom:8px}
  .story-content .s-offer{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:22px}
  .story-content .s-code-lbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:8px}
  .story-content .s-code{display:inline-block;padding:12px 20px;border-radius:14px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);
    font-family:monospace;font-size:18px;font-weight:900;letter-spacing:3px;margin-bottom:26px}
  .story-content .s-visit{pointer-events:all;display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:300px;
    padding:15px;border-radius:14px;background:#fff;color:#0C1527;font-weight:800;font-size:15px;border:none;cursor:pointer;font-family:var(--font)}

  /* ── CATEGORIES PAGE ── */
  .cats-page-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .cat-tile{display:flex;align-items:center;justify-content:space-between;padding:16px;border-radius:16px;
    background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--t1);font-weight:800;font-size:14px;cursor:pointer;transition:0.2s}
  .cat-tile:active{transform:scale(0.96)}
  .cat-tile .cnt{font-size:11px;color:var(--em);font-weight:700;background:rgba(16,185,129,0.12);padding:3px 9px;border-radius:20px}
  </style>

  <div class="stores">
    <div id="sectionTitle" style="padding:0 18px 12px;font-size:14px;font-weight:800;color:var(--t1);opacity:0.85"></div>
    <div class="grid" id="storesGrid"></div>
  </div>
</main>

<!-- ═══════════════════════════════════════════════════════════════════
     VIEW: CATEGORY — صفحة قسم معيّن (متاجر هذا القسم)
     ═══════════════════════════════════════════════════════════════════ -->
<main id="viewCategory" class="subview">
  <button class="sv-back" onclick="goBack()">← <span id="catBackLbl">رجوع</span></button>
  <div class="sv-title" id="catTitle">قسم</div>
  <div class="grid" id="catGrid"></div>
</main>

<!-- ═══════════════════════════════════════════════════════════════════
     VIEW: STORE — صفحة متجر مفرد (الكوبون + الذهاب)
     ═══════════════════════════════════════════════════════════════════ -->
<main id="viewStore" class="subview">
  <button class="sv-back" onclick="goBack()">← <span id="storeBackLbl">رجوع</span></button>
  <div id="storeBody"></div>
</main>

<!-- ═══════════════════════════════════════════════════════════════════
     VIEW: LIST — صفحة مستقلة لكل المتاجر / الترند
     ═══════════════════════════════════════════════════════════════════ -->
<main id="viewList" class="subview">
  <button class="sv-back" onclick="goBack()">← <span id="listBackLbl">رجوع</span></button>
  <div class="sv-title" id="listTitle">المتاجر</div>
  <div class="grid" id="listGrid"></div>
</main>

<!-- ═══════════════════════════════════════════════════════════════════
     VIEW: CATEGORIES — صفحة مستقلة لكل الأقسام (chips منقولة من الهوم)
     ═══════════════════════════════════════════════════════════════════ -->
<main id="viewCategories" class="subview">
  <button class="sv-back" onclick="goBack()">← <span id="catsBackLbl">رجوع</span></button>
  <div class="sv-title" id="catsPageTitle">الأقسام</div>
  <div id="catsPageGrid" class="cats-page-grid"></div>
</main>

<!-- ═══════════════════════════════════════════════════════════════════
     STORY VIEWER — عارض ملء الشاشة (overlay، ليس view في switchView)
     ═══════════════════════════════════════════════════════════════════ -->
<div id="storyViewer" class="story-viewer">
  <div class="story-progress" id="storyProgress"></div>
  <button class="story-close" onclick="closeStory()" aria-label="إغلاق">✕</button>
  <div class="story-tap story-tap-prev" onclick="storyPrev()"></div>
  <div class="story-tap story-tap-next" onclick="storyNext()"></div>
  <div class="story-content" id="storyContent"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════
     PROFILE MODAL — إلزامي عند أول فتح (gender + birth_date)
     يُظهَر بعد فحص /users/telegram-profile/status لو has_demographics=false
     ═══════════════════════════════════════════════════════════════════ -->
<div id="pfOverlay" class="overlay pf-overlay" role="dialog" aria-modal="true" aria-labelledby="pfTitle">
  <div class="pf-sheet">
    <h2 id="pfTitle" class="pf-title">أكمل بياناتك بسرعة</h2>
    <p class="pf-subtitle">معلومة واحدة فقط — حتى نعرض لك أنسب العروض</p>

    <div class="pf-row">
      <label class="pf-label">الجنس</label>
      <div class="pf-gender-grid">
        <button type="button" class="pf-gender-btn" id="pfGenderMale"   onclick="pfSelectGender('male')">ذكر</button>
        <button type="button" class="pf-gender-btn" id="pfGenderFemale" onclick="pfSelectGender('female')">أنثى</button>
      </div>
    </div>

    <div class="pf-row">
      <label class="pf-label" for="pfBirthDate">تاريخ الميلاد</label>
      <input type="date" id="pfBirthDate" class="pf-date" dir="ltr">
    </div>

    <div class="pf-error" id="pfError"></div>

    <button id="pfSubmit" class="pf-submit" onclick="pfSubmit()">حفظ والمتابعة</button>
  </div>
</div>

<script>
// ── Telegram WebApp integration (ready/expand/theme) ─────────────────────
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  try {
    tg.ready();        // يُعلم Telegram أن التطبيق محمّل (يخفي شاشة التحميل)
    tg.expand();       // يفتح كامل الشاشة (vs نصف الشاشة الافتراضي)
    tg.enableClosingConfirmation();  // يطلب تأكيد قبل الإغلاق
    // theme: ندمج لون header مع gradient التطبيق
    if (tg.setHeaderColor) tg.setHeaderColor('#080E1D');
    if (tg.setBackgroundColor) tg.setBackgroundColor('#080E1D');

    if (srch) srch.style.display = (name === 'home') ? 'block' : 'none';
    currentView = name;
    window.scrollTo({ top: 0, behavior: 'instant' });
    updateTelegramBackButton();
}

function updateTelegramBackButton() {
    if (!tg || !tg.BackButton) return;
    if (currentView === 'home') {

}

function goBack() {
    const prev = viewStack.pop() || { view: 'home', context: {} };
    viewContext = prev.context || {};

    // أعد رسم الـ view المُرجَع إليه حسب نوعه
    if (prev.view === 'category' && viewContext.category) renderCategoryView(viewContext.category);
    else if (prev.view === 'list' && viewContext.listMode) renderListView(viewContext.listMode);
    else if (prev.view === 'categories') renderCategoriesPage();

// ── Force-Fetch loader — multiple cache-busting layers ─────────────────────
// طبقات منع الـ cache:
//   1. ?t={Date.now()} + ?r={random} على URL (يمنع HTTP cache + Service Worker)
//   2. cache: 'no-store' (يمنع HTTP cache على مستوى fetch)
//   3. headers: Cache-Control/Pragma صريحة (يمنع reverse-proxy cache)
//   4. console.log واضح يطبع timestamp + count لتأكيد كل تحميل من جديد
// ملاحظة: لو البيانات ما تتحدث رغم كل ذلك، المشكلة في الـ DB نفسها وليست
// في الـ frontend cache. افحص /api/v1/coupons في متصفّح خارجي مباشرةً.
async function loadData() {
    const t0 = Date.now();
    const url = `${API_BASE}/coupons/?limit=50&lang=${LANG_CURRENT}&t=${t0}&r=${Math.random().toString(36).slice(2,10)}`;

    try {
        const res = await fetch(url, {
            method: 'GET',
            cache: 'no-store',
            credentials: 'omit',
            headers: {
                'Cache-Control': 'no-cache, no-store, must-revalidate, max-age=0',
                'Pragma': 'no-cache',
                'Accept': 'application/json',
            },
        });

        if (!res.ok) {
            console.error('[loadData] HTTP', res.status, res.statusText);
            showToast(S.fetchErr);
            return;
        }

        const payload = await res.json();
        const items = payload.results || [];

        // ── منطق الـ link (يعالج البيانات الفاسدة بأمان) ────────────────
        // أولوية:
        //   1. cloaked_slug → /go/{slug} (مُتتبَّع + bot challenge عبر Cloudflare)
        //   2. affiliate_link لو URL سليم (يبدأ بـ http)
        //   3. # fallback (يفتح نفس الصفحة — تجنّب JS exceptions)
        const buildLink = (item) => {
            if (item.cloaked_slug) {
                const uq = tgUserId ? `&u=${tgUserId}` : '';
                return `${window.location.origin}/go/${item.cloaked_slug}?s=miniapp${uq}`;
            }
            const raw = (item.affiliate_link || '').trim();
            if (raw.startsWith('http://') || raw.startsWith('https://')) {
                return raw;
            }
            return '#';   // لا nav إذا الرابط فاسد — نعرض toast بدل
        };

        ALL = items.map(item => ({
            id: item.id,
            store_id: item.store_id || (LANG_CURRENT === 'en' ? 'Store' : 'متجر'),
            disc: item.discount_value || (LANG_CURRENT === 'en' ? 'Special offer' : 'خصم خاص'),
            coupon: item.public_coupon || '',
            link: buildLink(item),
            logo: item.logo_url || 'logo.png',
            bio: item.store_bio || '',
            trending: item.is_trending === 'ترند 🔥',
            promoted: !!item.is_promoted,
            // store_tags array (يأتي مُسطّحاً من الـ API) — يدعم الفلترة بالقسم
            tags: Array.isArray(item.store_tags) ? item.store_tags
                  : (Array.isArray(item.store_tags_en) ? item.store_tags_en : []),
        }));

        const dt = Date.now() - t0;
        console.log(`[loadData] OK · ${ALL.length} stores · ${dt}ms · ${new Date().toISOString()}`);
        const dbgEl = document.getElementById('lastSync');
        if (dbgEl) {
            const hh = new Date().toLocaleTimeString(LANG_CURRENT === 'en' ? 'en-US' : 'ar-SA');
            dbgEl.textContent = `↻ ${hh} · ${ALL.length}`;
        }

        renderStores();
        updateStats();
        renderStoryRow();
    } catch (err) {
        console.error('[loadData] failed:', err);
        showToast(STRINGS[LANG_CURRENT].fetchErr);
    }
}

// ── Tracking helper (best-effort, non-blocking) ──────────────────────────
// يستدعي /api/v1/track عند نسخ كوبون أو نقر رابط — تُحقن مرّة واحدة لكل
// حدث ولا تعطّل التجربة لو فشل التتبّع.
async function trackEvent(store_id, action) {
    try {
        const eventId = (crypto.randomUUID && crypto.randomUUID()) ||
                        (Date.now() + '-' + Math.random().toString(36).slice(2, 10));
        fetch(`${API_BASE}/track`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: tgUserId,
                store_id: store_id,
                action: action,                // 'click_link' | 'copy_coupon'
                source: 'telegram_miniapp',
                event_id: eventId
            }),
            keepalive: true                    // يُكمل الطلب حتى لو أُغلقت الواجهة
        }).catch(() => {});
    } catch (e) { /* silent */ }
}

function updateStats() {
    // 3 ستات بنفس ترتيب الموقع: ترند / قسم / متجر
    document.getElementById('sTrend').textContent  = ALL.filter(x => x.trending).length;
    document.getElementById('sCats').textContent   = CATS.length;

}

function renderStores() {
    const ST = STRINGS[LANG_CURRENT];
    const titleEl = document.getElementById('sectionTitle');
    const grid = document.getElementById('storesGrid');
    let list;
    if (activeSearch) {
        list = ALL.filter(s => {
            const hay = (s.store_id + ' ' + (s.bio || '') + ' ' + (s.tags || []).join(' ')).toLowerCase();
            return hay.includes(activeSearch);
        });
        if (titleEl) titleEl.textContent = LANG_CURRENT === 'en' ? 'Search results' : 'نتائج البحث';
    } else {
        // أبرز المتاجر: الترند أولاً، بحد 8 — والباقي عبر بطاقة «متجر»
        list = [...ALL].sort((a, b) => (b.trending ? 1 : 0) - (a.trending ? 1 : 0)).slice(0, 8);
        if (titleEl) titleEl.textContent = ST.sectionAll;
    }
    if (!list.length) {
        const msg = LANG_CURRENT === 'en' ? 'No matching stores. Try another search.' : 'لا توجد نتائج مطابقة. جرّب كلمة أخرى.';
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--t3);padding:40px 20px;font-size:13px">${msg}</div>`;
        return;
    }
    grid.innerHTML = list.map(storeCardHTML).join('');
}

function openLinkCurrent() {
    const s = window._activeStore;
    if (!s) return;
    // حماية: لو الـ link فاسد (#) لا نفتح أي شيء — نعرض toast بدلاً.
    if (!s.link || s.link === '#') {
        showToast(LANG_CURRENT === 'en' ? 'Link unavailable' : 'الرابط غير متوفّر');

    }
    // نقرات /go تُسجَّل في السيرفر (مصدر telegram_miniapp + IP/مدينة)، فلا نكرّرها هنا.
    // الرابط الخام (متجر بلا cloaked_slug) لا يمرّ على السيرفر → نسجّله هنا لتفادي ضياع النقرة.
    if (!s.link.includes('/go/')) {
        trackEvent(s.store_id, 'click_link');
    }
    if (tg && tg.openLink) {
        tg.openLink(s.link);
    } else {
        window.open(s.link, '_blank');
    }
}

function copyText(txt) {
    // Telegram WebApp قد لا يدعم navigator.clipboard في كل الإصدارات — نضمن fallback
    try {
        navigator.clipboard.writeText(txt);
    } catch (e) {
        const ta = document.createElement('textarea');
        ta.value = txt; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    }
    showToast(S.copied);
}

// ── تتبع البحث ──────────────────────────────────────────────────────────
// قاعدة التصميم: **بحث واحد لكل نيّة واحدة**.
// نسجّل فقط عند action صريح: نقر نتيجة بحث، Enter، أو إغلاق الميني-ويب.
// حماية ثانية: dedup بالكلمة + الوقت (نفس الكلمة خلال 30s = تجاهل) —
// يحمي من أي سلوك مزدوج للـ sendBeacon في Telegram WebView على Android.
let _searchPending = null;
let _lastSentKw = null;
let _lastSentAt = 0;
const _DEDUP_MS = 30000;

// helper: أرسل JSON عبر sendBeacon (مع fallback لـ fetch+keepalive)
function _postFireAndForget(url, body) {
    try {
        if (navigator.sendBeacon) {
            const ok = navigator.sendBeacon(url, new Blob([body], { type: 'application/json' }));
            if (ok) return;
        }
    } catch (e) {}
    fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: body,
        keepalive: true,
    }).catch(() => {});
}

function _sendSearchTrack() {
    if (!_searchPending) return;
    const p = _searchPending;
    _searchPending = null;        // تصفير فوري

    // dedup: نفس الكلمة + خلال 30 ثانية = تجاهل
    const now = Date.now();
    if (_lastSentKw === p.kw && (now - _lastSentAt) < _DEDUP_MS) {
        return;
    }
    _lastSentKw = p.kw;
    _lastSentAt = now;

    // استدعاء واحد فقط: السيرفر يكتب في direct_search + action_logs (atomic).
    // كتابتان من العميل عبر sendBeacon متتاليتين غير موثوقتين على Telegram
    // WebView (Android خاصةً). dual-write في السيرفر يحلّ هذا.
    _postFireAndForget(`${API_BASE}/track/search`, JSON.stringify({
        keyword: p.kw,
        store_id: p.matches[0] ? p.matches[0].store_id : null,
        user_found: p.matches.length > 0,
        platform: 'Miniapp',
        user_id: tgUserId,
    }));
}

function flushSearchTrack() {
    _sendSearchTrack();
}

function onSearch(v) {
    activeSearch = v.toLowerCase();
    renderStores();

    // نُحدّث pending فقط. الإرسال عند action لاحقاً.
    const kw = (v || '').trim();
    if (kw.length < 2) {
        _searchPending = null;
        return;
    }
    const matches = ALL.filter(s => {
        const hay = (s.store_id + ' ' + (s.bio || '') + ' ' + (s.tags || []).join(' ')).toLowerCase();
        return hay.includes(kw.toLowerCase());
    });
    _searchPending = { kw, matches };
}

// closeModal: لم يعد مستخدماً (لا modal). محفوظ كـ no-op للـ backward compat.
function closeModal() {
    const o = document.getElementById('overlay');
    if (o) o.classList.remove('on');
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('on');
    setTimeout(() => t.classList.remove('on'), 2500);
}

async function refreshData() {
    showToast(S.refreshing);
    await loadData();
}

// ═══════════════════════════════════════════════════════════════════════════
//                  STORY VIEWER — صف دوائر + عارض ملء الشاشة
// ═══════════════════════════════════════════════════════════════════════════
let STORY = [];          // المتاجر المعروضة كـ stories
let storyIdx = 0;
let storyRAF = null;
let storyStart = 0;
const STORY_MS = 6000;

function renderStoryRow() {
    const row = document.getElementById('storyRow');
    if (!row) return;
    STORY = ALL.filter(s => s.promoted);
    if (!STORY.length) STORY = ALL.filter(s => s.trending);   // fallback: الترند لو ما في promoted
    STORY = STORY.slice(0, 12);
    row.innerHTML = STORY.map((s, i) => {
        const logo = (s.logo || 'logo.png').replace(/"/g, '&quot;');
        return `<button class="story-item" onclick="openStory(${i})">
            <span class="story-ring"><span class="inner"><img src="${logo}" onerror="this.onerror=null;this.src='logo.png'"></span></span>
            <span class="story-name">${s.store_id}</span></button>`;
    }).join('');
}

function openStory(i) {
    if (i < 0 || i >= STORY.length) return;
    storyIdx = i;
    document.getElementById('storyViewer').classList.add('on');
    renderStorySlide();
    startStoryTimer();
}

function closeStory() {
    document.getElementById('storyViewer').classList.remove('on');
    if (storyRAF) cancelAnimationFrame(storyRAF);
    storyRAF = null;
}

function storyNext() { if (storyIdx >= STORY.length - 1) { closeStory(); return; } storyIdx++; renderStorySlide(); startStoryTimer(); }
function storyPrev() { if (storyIdx <= 0) return; storyIdx--; renderStorySlide(); startStoryTimer(); }

function renderStorySlide() {
    const s = STORY[storyIdx];
    if (!s) return;
    const ST = STRINGS[LANG_CURRENT];
    const logo = (s.logo || 'logo.png').replace(/"/g, '&quot;');
    document.getElementById('storyProgress').innerHTML =
        STORY.map((_, i) => `<span class="seg"><i id="seg${i}" style="width:${i < storyIdx ? '100%' : '0'}"></i></span>`).join('');
    document.getElementById('storyContent').innerHTML = `
        <div class="s-logo"><img src="${logo}" onerror="this.onerror=null;this.src='logo.png'"></div>
        <h3>${s.store_id}${s.trending ? ' 🔥' : ''}</h3>
        ${s.disc ? `<div class="s-offer">Exclusive · ${s.disc}</div>` : ''}
        ${s.coupon ? `<div class="s-code-lbl">${LANG_CURRENT === 'en' ? 'Coupon code' : 'كود الخصم'}</div><div class="s-code">${s.coupon}</div>` : ''}
        <button class="s-visit" onclick="storyVisit(${s.id})">${ST.goToStore}</button>`;
}

function startStoryTimer() {
    if (storyRAF) cancelAnimationFrame(storyRAF);
    storyStart = performance.now();
    const seg = document.getElementById('seg' + storyIdx);
    const tick = (now) => {
        const pct = Math.min((now - storyStart) / STORY_MS, 1);
        if (seg) seg.style.width = (pct * 100) + '%';
        if (pct >= 1) storyNext();
        else storyRAF = requestAnimationFrame(tick);
    };
    storyRAF = requestAnimationFrame(tick);
}

// زيارة المتجر من الستوري — يفتح صفحة المتجر داخل الميني (لا تحويل خارجي)
function storyVisit(id) {
    closeStory();
    showStoreView(id);
}

// ── Visibility change: عند العودة لـ Mini App بعد فتحه، أعد التحميل ────
document.addEventListener('visibilitychange', () => {
    if (!document.hidden) { loadData(); loadCategories(); }
});

// Telegram BackButton — onClick يستدعي goBack محلي (لا يُغلق Mini App)
if (tg && tg.BackButton && typeof tg.BackButton.onClick === 'function') {
    tg.BackButton.onClick(() => goBack());
}

// ═══════════════════════════════════════════════════════════════════════════
//                  PROFILE MODAL — إلزامي عند أول فتح
// ═══════════════════════════════════════════════════════════════════════════
// يفحص /users/telegram-profile/status بـ initData؛ لو has_demographics=false
// يعرض موديال يطلب gender + birth_date. لا يُغلق إلا بالحفظ الناجح.

let pfSelectedGender = null;

function pfApplyLabels() {
    const ST = STRINGS[LANG_CURRENT];
    _setText('pfTitle', ST.pfTitle);
    const subEl = document.querySelector('#pfOverlay .pf-subtitle');
    if (subEl) subEl.textContent = ST.pfSubtitle;
    const lbls = document.querySelectorAll('#pfOverlay .pf-label');
    if (lbls.length >= 2) {
        lbls[0].textContent = ST.pfGenderLbl;
        lbls[1].textContent = ST.pfBirthLbl;
    }
    _setText('pfGenderMale',   ST.pfMale);
    _setText('pfGenderFemale', ST.pfFemale);
    _setText('pfSubmit',       ST.pfSubmit);
}

function pfSetDateBounds() {
    const today = new Date();
    const max = new Date(today.getFullYear() - 10, today.getMonth(), today.getDate());
    const min = new Date(today.getFullYear() - 100, today.getMonth(), today.getDate());
    const fmt = (d) => d.toISOString().split('T')[0];
    const inp = document.getElementById('pfBirthDate');
    if (inp) {
        inp.max = fmt(max);
        inp.min = fmt(min);
    }
}

function pfShow() {
    pfApplyLabels();
    pfSetDateBounds();
    document.getElementById('pfOverlay').classList.add('on');
    // BackButton لا يقدر يلغي الموديال — نخفيه أثناء عرضه
    if (tg && tg.BackButton) try { tg.BackButton.hide(); } catch(e){}
}

function pfHide() {
    document.getElementById('pfOverlay').classList.remove('on');
}

function pfSelectGender(g) {
    pfSelectedGender = g;
    document.getElementById('pfGenderMale').classList.toggle('sel',   g === 'male');
    document.getElementById('pfGenderFemale').classList.toggle('sel', g === 'female');
}

async function pfSubmit() {
    const ST = STRINGS[LANG_CURRENT];
    const errEl = document.getElementById('pfError');
    errEl.textContent = '';

    const birth = document.getElementById('pfBirthDate').value;
    if (!pfSelectedGender || !birth) {
        errEl.textContent = ST.pfErrPick;
        return;
    }
    // تحقق عمر محلي (server يتحقق أيضاً)
    const birthDate = new Date(birth);
    const ageYears = Math.floor((Date.now() - birthDate.getTime()) / (365.25 * 24 * 3600 * 1000));
    if (ageYears < 10 || ageYears > 100) {
        errEl.textContent = ST.pfErrAge;
        return;
    }

    const initData = (tg && tg.initData) || '';
    if (!initData) {
        // خارج Telegram (متصفّح اختبار) — لا نقدر نحفظ. نخفي الموديال بهدوء.
        pfHide();
        return;
    }

    const btn = document.getElementById('pfSubmit');
    btn.disabled = true;
    const oldText = btn.textContent;
    btn.textContent = ST.pfSaving;

    try {
        const res = await fetch(`${API_BASE}/users/telegram-profile`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                init_data: initData,
                gender: pfSelectedGender,
                birth_date: birth,
            }),
        });
        if (!res.ok) throw new Error('save failed');
        pfHide();
    } catch (e) {
        errEl.textContent = ST.pfErrSave;
        btn.disabled = false;
        btn.textContent = oldText;
    }
}

async function initProfileCheck() {
    // لو ما في initData (خارج Telegram أو نسخة قديمة) → تخطّى الفحص
    const initData = (tg && tg.initData) || '';
    if (!initData) return;
    try {
        const res = await fetch(`${API_BASE}/users/telegram-profile/status`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ init_data: initData }),
        });
        if (!res.ok) return;          // فشل التحقق = نتركه يستخدم التطبيق
        const data = await res.json();
        if (!data.has_demographics) pfShow();
    } catch (e) { /* خطأ شبكة → نتركه يستخدم التطبيق */ }
}

// إقلاع: home view + تحميل البيانات + الأقسام بالتوازي
// ملاحظة: initProfileCheck() معطّل عمداً — قرار استراتيجي بإلغاء الموديال
// الإلزامي للحفاظ على «صفر احتكاك». البنية كاملة (DB + API + dashboard tab)
// خاملة جاهزة لتفعيلها مستقبلاً لو غيّرنا الاستراتيجية.
document.addEventListener('DOMContentLoaded', () => {
    switchView('home');
    loadCategories();
    loadData();
    // initProfileCheck();  // disabled — see comment above

    // Enter = إرسال فوري (نيّة واضحة)
    // أزلت blur + beforeunload + visibilitychange — كلها triggers مشكوك فيها
    // في Telegram WebView (تُطلق على فتح/إغلاق keyboard وغيره). نكتفي بـ:
    //   showStoreView (نقر نتيجة بحث)، Enter، pagehide.
    const _srch = document.getElementById('srchInput');
    if (_srch) {
        _srch.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                flushSearchTrack();
                _srch.blur();   // يخفي الـ keyboard على الجوال
            }
        });
    }
});

// إغلاق الميني-ويب فقط — آخر فرصة لإرسال البحث المعلّق
window.addEventListener('pagehide', flushSearchTrack);
</script>
