[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --color=yes
markers =
    slow: tests that take > 1s (integration or e2e)
    requires_db: tests that need a real PostgreSQL connection
    requires_llm: tests that need a real LLM API key
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
