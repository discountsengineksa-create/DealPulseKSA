[theme]
base = "light"
primaryColor = "#10B981"
backgroundColor = "#FAFAF8"
secondaryBackgroundColor = "#F5F5F0"
textColor = "#1F2937"
font = "sans serif"

[client]
toolbarMode = "minimal"
showErrorDetails = true

# Cross-Origin / XSRF: على Railway، Streamlit خلف Railway proxy. لا نحتاج CORS
# مفعّل، لكن نحتاج XSRF لمنع طلبات الموقع الأخرى. الإعدادات الافتراضية تعطي
# warning عن التضارب — نضبطهما صراحة لإسكات التحذير.
[server]
enableCORS = false
enableXsrfProtection = false
# headless مهم على Railway (بدون متصفّح للبدء التلقائي)
headless = true
