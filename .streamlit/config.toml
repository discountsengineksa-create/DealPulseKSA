[theme]
base = "dark"
primaryColor = "#10B981"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"

[client]
# viewer: يُظهر قائمة الإعدادات (☰ → Settings → Theme) لتبديل ليلي/نهاري، بدون أدوات المطوّر.
toolbarMode = "viewer"
showErrorDetails = true

# Cross-Origin / XSRF خلف بروكسي Railway:
#   - نُبقي enableCORS=true (حماية cross-origin + لا يظهر «التحذير الأحمر»
#     الذي يظهر فقط عند enableCORS=false). لا تضع enableCORS=false إطلاقاً.
#   - نُطفئ enableXsrfProtection لأن نقطة رفع الملفات (/_stcore/upload_file)
#     محميّة بتوكن XSRF يفشل تطابقه/تنتهي صلاحيته خلف بروكسي Railway → يظهر
#     أيقونة خطأ حمراء على الملف المرفوع («فشل الرفع») حتى لملف 1.4MB صغير.
#     إطفاؤه يصلح رفع صور الثيمات/الشعارات. المقايضة مقبولة: الداشبورد للمشرف فقط.
[server]
enableCORS = true
enableXsrfProtection = false
# headless مهم على Railway (بدون متصفّح للبدء التلقائي)
headless = true
