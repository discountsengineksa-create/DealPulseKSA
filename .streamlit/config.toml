[theme]
base = "dark"
primaryColor = "#10B981"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"

[client]
# viewer: يُظهر قائمة الإعدادات (☰ → Settings → Theme) لتبديل ليلي/نهاري، بدون أدوات المطوّر.
toolbarMode = "viewer"
showErrorDetails = true

# Cross-Origin / XSRF: نُبقي الحمايتين مفعّلتين (آمن) وهما متوافقتان فلا يظهر
# تحذير. التحذير الأحمر يظهر فقط عند enableCORS=false مع enableXsrfProtection=true.
# لا تضع enableCORS=false هنا ولا في أمر التشغيل.
[server]
enableCORS = true
enableXsrfProtection = true
# headless مهم على Railway (بدون متصفّح للبدء التلقائي)
headless = true
